<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>RideApp — Book a Ride</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#09090f;--surf:#111118;--card:#18181f;--border:#242430;
      --accent:#f59e0b;--acc-d:#d97706;--glow:rgba(245,158,11,.16);
      --green:#10b981;--red:#f43f5e;--blue:#6366f1;
      --text:#f1f1f8;--sub:#6b6b85;--muted:#2a2a38;
      --sb:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;min-height:100vh;display:flex;flex-direction:column;background-image:radial-gradient(ellipse 80% 25% at 50% 0%,rgba(245,158,11,.08) 0%,transparent 60%);overflow-x:hidden}

    /* Top bar */
    #topbar{position:sticky;top:0;z-index:100;background:rgba(9,9,15,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:13px 17px;display:flex;align-items:center;justify-content:space-between}
    .tbl{display:flex;align-items:center;gap:11px}
    .mark{width:37px;height:37px;background:linear-gradient(135deg,var(--accent),var(--acc-d));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .app-n{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff}
    #greeting{font-size:13px;color:var(--sub);margin-top:1px;max-width:155px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #btn-out{background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;padding:9px 13px;cursor:pointer;transition:border-color .2s,color .2s}
    #btn-out:active{border-color:var(--red);color:var(--red)}

    /* Main */
    #main{flex:1;overflow-y:auto;padding:16px 15px calc(30px + var(--sb));display:flex;flex-direction:column;gap:14px}

    /* Card */
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 17px;animation:up .3s ease}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .clabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);margin-bottom:15px}

    /* Fields */
    .field{margin-bottom:13px}
    .flabel{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sub);margin-bottom:7px}
    .fw{position:relative}
    .fi{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;line-height:1}
    .inp{width:100%;background:var(--surf);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;padding:14px 14px 14px 44px;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
    .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
    .inp::placeholder{color:var(--muted)}
    input[type="date"],input[type="time"]{color-scheme:dark}
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(.5)}

    /* Location stack */
    .loc-stack{margin-bottom:14px}
    .loc-row{display:flex;align-items:center;gap:13px;padding:3px 0}
    .ldot{width:11px;height:11px;border-radius:50%;flex-shrink:0;background:var(--accent);border:2px solid var(--accent)}
    .ldot.d{background:transparent;border-color:var(--red)}
    .lline{width:2px;height:22px;background:var(--border);margin-left:4.5px;flex-shrink:0}
    .linp{flex:1;background:var(--surf);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;padding:14px 14px;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
    .linp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
    .linp::placeholder{color:var(--muted)}

    /* Schedule toggle */
    .stoggle{display:flex;background:var(--surf);border:1px solid var(--border);border-radius:13px;padding:4px;gap:4px;margin-bottom:14px}
    .stab{flex:1;padding:12px;border:none;border-radius:10px;background:transparent;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
    .stab.active{background:var(--card);color:var(--text);box-shadow:0 2px 10px rgba(0,0,0,.4)}
    .dtrow{display:none;gap:10px;margin-bottom:14px}
    .dtrow.show{display:flex}
    .dtrow .fw{flex:1}

    /* Book button */
    #btn-book{width:100%;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--acc-d));color:#000;font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 8px 24px rgba(245,158,11,.28);transition:opacity .2s,transform .12s}
    #btn-book:active{transform:scale(.98)}#btn-book:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
    .spin{width:20px;height:20px;border:2.5px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    #bk-msg{font-size:14px;text-align:center;margin-top:11px;min-height:18px;color:var(--sub)}

    /* Active ride */
    #active-card{display:none}
    #active-card.show{display:block}

    .steps{display:flex;margin-bottom:18px}
    .step{flex:1;text-align:center;position:relative}
    .sdot2{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;margin:0 auto 5px;font-size:.75rem;transition:all .4s}
    .step.done .sdot2{background:var(--green);border-color:var(--green)}
    .step.active .sdot2{background:var(--accent);border-color:var(--accent)}
    .slbl{font-size:12px;font-weight:600;color:var(--sub)}
    .step.done .slbl,.step.active .slbl{color:var(--text)}
    .sline{position:absolute;top:14px;left:50%;width:100%;height:2px;background:var(--border);z-index:-1}
    .step.done .sline{background:var(--green)}

    .s-strip{display:flex;align-items:center;gap:12px;background:var(--surf);border-radius:14px;padding:14px 15px;margin-bottom:13px}
    .sico{font-size:1.4rem;flex-shrink:0}
    .sinf{flex:1;min-width:0}
    .stit{font-size:16px;font-weight:700}
    .ssub{font-size:13px;color:var(--sub);margin-top:2px}
    .sbdg{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:6px 11px;border-radius:20px;flex-shrink:0}
    .sb-pending  {background:rgba(107,107,133,.15);color:var(--sub)}
    .sb-assigned {background:rgba(99,102,241,.15);color:#818cf8}
    .sb-ongoing  {background:rgba(16,185,129,.15);color:var(--green)}

    .sched-banner{display:flex;align-items:flex-start;gap:11px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.22);border-radius:13px;padding:13px 14px;margin-bottom:13px}
    .sched-banner .ico{font-size:1.1rem;margin-top:1px}
    .sdt{font-size:15px;font-weight:700;color:#c7d2fe}
    .ssb{font-size:13px;color:#818cf8;margin-top:3px}

    .rbox{background:var(--surf);border-radius:13px;padding:14px;margin-bottom:13px}
    .rrow{display:flex;align-items:flex-start;gap:11px;padding:5px 0}
    .rico{font-size:.95rem;margin-top:2px;flex-shrink:0}
    .rlbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sub)}
    .rval{font-size:15px;font-weight:600;color:var(--text);margin-top:2px}
    .rsep{width:2px;height:13px;background:var(--border);margin-left:7px}

    #btn-cancel{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:13px;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;padding:14px;cursor:pointer;transition:border-color .2s,color .2s}
    #btn-cancel:active{border-color:var(--red);color:var(--red)}
    #btn-cancel:disabled{opacity:.35;cursor:not-allowed}

    /* History */
    .hem{text-align:center;color:var(--sub);font-size:14px;padding:20px 0}
    .hi{background:var(--surf);border:1px solid var(--border);border-radius:13px;padding:13px 14px;margin-bottom:10px}
    .hi-rt{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:15px;font-weight:600;margin-bottom:7px}
    .hi-bt{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px}
    .hi-date{font-size:13px;color:var(--sub)}
    .hi-st{font-size:12px;font-weight:700;text-transform:uppercase;padding:4px 9px;border-radius:20px}
    .hs-completed{background:rgba(16,185,129,.12);color:var(--green)}
    .hs-rejected {background:rgba(244,63,94,.12);color:#fb7185}
    .hs-cancelled{background:rgba(107,107,133,.12);color:var(--sub)}

    /* Toast */
    #toast{position:fixed;bottom:calc(20px + var(--sb));left:50%;transform:translateX(-50%) translateY(90px);background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:13px;padding:13px 22px;font-size:14px;font-weight:600;color:var(--text);z-index:999;white-space:nowrap;transition:transform .35s cubic-bezier(.34,1.4,.64,1)}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div id="topbar">
  <div class="tbl">
    <div class="mark">🚕</div>
    <div><div class="app-n">RideApp</div><div id="greeting">Loading…</div></div>
  </div>
  <button id="btn-out">Sign Out</button>
</div>

<div id="main">

  <!-- Book -->
  <div class="card" id="book-card">
    <div class="clabel">Book a Ride</div>

    <div class="loc-stack">
      <div class="loc-row"><div class="ldot"></div><input class="linp" type="text" id="inp-pickup" placeholder="Pickup location"/></div>
      <div style="display:flex;padding:0 5px"><div class="lline"></div></div>
      <div class="loc-row"><div class="ldot d"></div><input class="linp" type="text" id="inp-drop" placeholder="Drop / destination"/></div>
    </div>

    <div class="field">
      <label class="flabel">📞 Your Phone Number</label>
      <div class="fw"><span class="fi">📱</span><input class="inp" type="tel" id="inp-phone" placeholder="+91 98765 43210" inputmode="tel" autocomplete="tel"/></div>
    </div>

    <div class="stoggle">
      <button class="stab active" id="tab-now"   type="button">⚡ Ride Now</button>
      <button class="stab"        id="tab-sched" type="button">📅 Schedule</button>
    </div>

    <div class="dtrow" id="dtrow">
      <div class="fw"><span class="fi">📅</span><input class="inp" type="date" id="inp-date" style="padding-left:44px"/></div>
      <div class="fw"><span class="fi">🕐</span><input class="inp" type="time" id="inp-time" style="padding-left:44px"/></div>
    </div>

    <button id="btn-book">
      <div class="spin" id="bspin"></div>
      <span id="blbl">🚕 Request Ride</span>
    </button>
    <div id="bk-msg"></div>
  </div>

  <!-- Active ride -->
  <div class="card" id="active-card">
    <div class="clabel">Your Ride</div>
    <div class="steps">
      <div class="step" id="st0"><div class="sdot2">📋</div><div class="slbl">Sent</div><div class="sline"></div></div>
      <div class="step" id="st1"><div class="sdot2">👤</div><div class="slbl">Assigned</div><div class="sline"></div></div>
      <div class="step" id="st2"><div class="sdot2">🚗</div><div class="slbl">On Way</div><div class="sline"></div></div>
      <div class="step" id="st3"><div class="sdot2">✅</div><div class="slbl">Done</div></div>
    </div>
    <div class="s-strip"><div class="sico" id="sico">⏳</div><div class="sinf"><div class="stit" id="stit">Finding a driver…</div><div class="ssub" id="ssub">Your request is with the admin</div></div><div class="sbdg sb-pending" id="sbdg">Pending</div></div>
    <div class="sched-banner" id="sched-banner" style="display:none"><div class="ico">📅</div><div><div class="sdt" id="sched-dt">Scheduled ride</div><div class="ssb">Driver will be reminded 30 min before</div></div></div>
    <div class="rbox">
      <div class="rrow"><div class="rico">📍</div><div><div class="rlbl">Pickup</div><div class="rval" id="a-pickup">—</div></div></div>
      <div class="rsep"></div>
      <div class="rrow"><div class="rico">🏁</div><div><div class="rlbl">Drop</div><div class="rval" id="a-drop">—</div></div></div>
    </div>
    <button id="btn-cancel">Cancel Ride</button>
  </div>

  <!-- History -->
  <div class="card">
    <div class="clabel">Past Rides <span id="hcnt" style="color:var(--sub)"></span></div>
    <div id="hlist"><div class="hem">No rides yet.</div></div>
  </div>

</div>
<div id="toast"></div>

<script type="module">
  import { requireAuth, logoutUser, db } from "./auth.js";
  import {
    collection, doc, addDoc, updateDoc,
    onSnapshot, query, where, orderBy, serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const { user, name, email, phone } = await requireAuth("customer");
  const uid=user.uid;
  document.getElementById("greeting").textContent=`Hi, ${name||email}`;
  document.getElementById("btn-out").addEventListener("click",async()=>{await logoutUser();window.location.href="login.html";});

  // Pre-fill phone if stored in profile
  if (phone) document.getElementById("inp-phone").value=phone;

  function toast(msg,color="var(--accent)"){
    const el=document.getElementById("toast");el.textContent=msg;el.style.borderLeftColor=color;
    el.classList.add("show");setTimeout(()=>el.classList.remove("show"),3400);
  }

  // Schedule toggle
  let isSched=false;
  const pad=n=>String(n).padStart(2,"0");
  const d30=new Date(Date.now()+30*60000);
  document.getElementById("inp-date").min=new Date().toISOString().split("T")[0];
  document.getElementById("inp-date").value=new Date().toISOString().split("T")[0];
  document.getElementById("inp-time").value=`${pad(d30.getHours())}:${pad(d30.getMinutes())}`;

  document.getElementById("tab-now").addEventListener("click",()=>{
    isSched=false;
    document.getElementById("tab-now").classList.add("active");
    document.getElementById("tab-sched").classList.remove("active");
    document.getElementById("dtrow").classList.remove("show");
    document.getElementById("blbl").textContent="🚕 Request Ride";
  });
  document.getElementById("tab-sched").addEventListener("click",()=>{
    isSched=true;
    document.getElementById("tab-sched").classList.add("active");
    document.getElementById("tab-now").classList.remove("active");
    document.getElementById("dtrow").classList.add("show");
    document.getElementById("blbl").textContent="📅 Schedule Ride";
  });

  let activeRideId=null;

  // Book
  document.getElementById("btn-book").addEventListener("click",book);
  ["inp-pickup","inp-drop","inp-phone"].forEach(id=>
    document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")book();})
  );

  async function book(){
    const pickup=document.getElementById("inp-pickup").value.trim();
    const drop=document.getElementById("inp-drop").value.trim();
    const ph=document.getElementById("inp-phone").value.trim();
    const msg=document.getElementById("bk-msg");
    msg.textContent="";msg.style.color="var(--sub)";

    if(!pickup||!drop){msg.textContent="⚠️ Enter pickup and destination.";msg.style.color="var(--red)";return;}
    if(!ph){msg.textContent="⚠️ Enter your phone number.";msg.style.color="var(--red)";return;}
    if(activeRideId){msg.textContent="⚠️ You already have an active ride.";msg.style.color="var(--red)";return;}

    let schedAt=null;
    if(isSched){
      const dv=document.getElementById("inp-date").value,tv=document.getElementById("inp-time").value;
      if(!dv||!tv){msg.textContent="⚠️ Pick date and time.";msg.style.color="var(--red)";return;}
      schedAt=new Date(`${dv}T${tv}`);
      if(schedAt<new Date(Date.now()+25*60000)){msg.textContent="⚠️ Schedule at least 30 min ahead.";msg.style.color="var(--red)";return;}
    }

    const btn=document.getElementById("btn-book"),spin=document.getElementById("bspin");
    btn.disabled=true;spin.style.display="block";
    try{
      await addDoc(collection(db,"ride_requests"),{
        customerId:uid,customerName:name||email,customerEmail:email,customerPhone:ph,
        pickup,drop,status:"pending",isScheduled:isSched,
        scheduledAt:schedAt?schedAt.toISOString():null,driverId:null,
        createdAt:serverTimestamp(),
      });
      document.getElementById("inp-pickup").value=document.getElementById("inp-drop").value="";
      toast(isSched?`📅 Scheduled for ${schedAt.toLocaleString([],{dateStyle:"medium",timeStyle:"short"})}!`:"🚕 Ride requested!","var(--green)");
    }catch(e){
      msg.textContent="❌ Failed. Try again.";msg.style.color="var(--red)";
      console.error("[Book]",e);
    }
    btn.disabled=false;spin.style.display="none";
  }

  // Active ride listener
  onSnapshot(
    query(collection(db,"ride_requests"),where("customerId","==",uid),where("status","in",["pending","dispatched","assigned","ongoing"])),
    snap=>{
      if(!snap.empty){
        const d=snap.docs[0];activeRideId=d.id;renderActive(d.data());
        document.getElementById("active-card").classList.add("show");
        document.getElementById("book-card").style.cssText="opacity:.4;pointer-events:none";
      }else{
        activeRideId=null;
        document.getElementById("active-card").classList.remove("show");
        document.getElementById("book-card").style.cssText="";
      }
    }
  );

  function renderActive(r){
    document.getElementById("a-pickup").textContent=r.pickup||"—";
    document.getElementById("a-drop").textContent=r.drop||"—";
    const m={
      pending:   {step:0,ico:"⏳",tit:"Finding a driver…",     sub:"Admin is reviewing your request",bdg:"sb-pending"},
      dispatched:{step:1,ico:"📢",tit:"Broadcast to drivers",   sub:"Waiting for driver to accept",   bdg:"sb-pending"},
      assigned:  {step:1,ico:"👤",tit:"Driver is coming",       sub:"Your driver accepted the ride",  bdg:"sb-assigned"},
      ongoing:   {step:2,ico:"🚗",tit:"Ride in progress",       sub:"Enjoy your ride!",               bdg:"sb-ongoing"},
    };
    const info=m[r.status]||m.pending;
    [0,1,2,3].forEach(i=>{
      const el=document.getElementById("st"+i);
      el.classList.remove("done","active");
      if(i<info.step)el.classList.add("done");
      if(i===info.step)el.classList.add("active");
    });
    document.getElementById("sico").textContent=info.ico;
    document.getElementById("stit").textContent=info.tit;
    document.getElementById("ssub").textContent=info.sub;
    const bdg=document.getElementById("sbdg");
    bdg.className="sbdg "+info.bdg;bdg.textContent=r.status;
    const banner=document.getElementById("sched-banner");
    if(r.isScheduled&&r.scheduledAt){
      document.getElementById("sched-dt").textContent="Scheduled: "+new Date(r.scheduledAt).toLocaleString([],{dateStyle:"medium",timeStyle:"short"});
      banner.style.display="flex";
    }else banner.style.display="none";
    document.getElementById("btn-cancel").disabled=r.status!=="pending";
  }

  document.getElementById("btn-cancel").addEventListener("click",async()=>{
    if(!activeRideId)return;
    document.getElementById("btn-cancel").disabled=true;
    try{await updateDoc(doc(db,"ride_requests",activeRideId),{status:"cancelled"});toast("Ride cancelled","var(--sub)");}
    catch(e){document.getElementById("btn-cancel").disabled=false;}
  });

  // History
  onSnapshot(
    query(collection(db,"ride_requests"),where("customerId","==",uid),where("status","in",["completed","rejected","cancelled"]),orderBy("createdAt","desc")),
    snap=>{
      const list=document.getElementById("hlist"),cnt=document.getElementById("hcnt");
      cnt.textContent=snap.size?`(${snap.size})`:"";
      list.innerHTML="";
      if(snap.empty){list.innerHTML='<div class="hem">No rides yet.</div>';return;}
      snap.forEach(d=>{
        const r=d.data(),date=r.createdAt?.toDate?r.createdAt.toDate().toLocaleDateString():"—";
        const sched=r.isScheduled&&r.scheduledAt?`<div style="font-size:13px;color:#a5b4fc;margin-bottom:5px">📅 ${new Date(r.scheduledAt).toLocaleString([],{dateStyle:"short",timeStyle:"short"})}</div>`:"";
        const item=document.createElement("div");item.className="hi";
        item.innerHTML=`<div class="hi-rt"><span>📍 ${r.pickup||"—"}</span><span style="color:var(--muted)">→</span><span>🏁 ${r.drop||"—"}</span></div>${sched}<div class="hi-bt"><span class="hi-date">${date}</span><span class="hi-st hs-${r.status}">${r.status}</span></div>`;
        list.appendChild(item);
      });
    }
  );
</script>
</body>
</html>
