<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Driver Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  \
  
  
  
  <style>

/* ================================
   🔥 MOBILE UX UPGRADE PACK
   ================================ */
@media (max-width: 768px){

  :root{
    font-size: 18px; /* base scale up */
  }

  /* ===== TEXT IMPROVEMENT ===== */
  body{
    line-height: 1.5;
  }

  .clabel, .flabel, .rlbl, .l, .sec{
    font-size: 13px !important;
    font-weight: 800 !important;
    letter-spacing: .05em;
    color: #a5b4fc !important;
  }

  .app-n, .app-t, .logo-t h1{
    font-size: 20px !important;
  }

  /* ===== INPUTS ===== */
  input, .inp, .linp, .finp{
    height: 56px !important;
    font-size: 17px !important;
    border-radius: 16px !important;
    padding: 16px 16px 16px 48px !important;
  }

  /* ===== BUTTONS (VERY IMPORTANT) ===== */
  button, .act-btn, .btn-bc, .btn-self, .btn-rej,
  #btn-book, #btn-go, #btn-complete, .dis-btn{
    height: 56px !important;
    font-size: 17px !important;
    border-radius: 16px !important;
  }

  /* make primary buttons more obvious */
  #btn-book, #btn-go, .btn-bc{
    font-size: 18px !important;
    font-weight: 800 !important;
  }

  /* ===== CARD SPACING ===== */
  .card, .req-card, .drv-card{
    padding: 20px !important;
    border-radius: 18px !important;
  }

  #main, .panel{
    padding: 18px !important;
    gap: 16px !important;
  }

  /* ===== TAP FRIENDLY LISTS ===== */
  .h-item, .req-card, .drv-card{
    margin-bottom: 12px !important;
  }

  /* ===== ROUTE TEXT CLEAN ===== */
  .req-route, .rval{
    font-size: 15px !important;
    line-height: 1.6;
  }

  /* ===== FIX SMALL CLICK AREAS ===== */
  .phone-btn, .active-phone, .popup-phone{
    padding: 16px !important;
    font-size: 17px !important;
  }

  /* ===== TOP BAR SPACING ===== */
  #topbar, #hdr{
    padding: 14px 16px !important;
  }

  /* ===== STATUS / BADGES ===== */
  .badge, .sbdg{
    font-size: 12px !important;
    padding: 6px 12px !important;
  }

  /* ===== POPUP (DRIVER) ===== */
  #ride-popup-box{
    padding: 22px !important;
    border-radius: 24px 24px 0 0 !important;
  }

  /* ===== SCROLL COMFORT ===== */
  *{
    -webkit-overflow-scrolling: touch;
  }
}



  </style>
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  <style>
    :root{
      --bg:#09090f;--surface:#111118;--card:#18181f;--border:#242430;
      --accent:#f59e0b;--acc-d:#d97706;
      --green:#10b981;--red:#f43f5e;--orange:#f59e0b;--blue:#6366f1;
      --text:#f1f1f8;--sub:#6b6b85;--muted:#2a2a38;
      --sb:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;min-height:100vh;display:flex;flex-direction:column;background-image:radial-gradient(ellipse 80% 20% at 50% 0%,rgba(245,158,11,.07) 0%,transparent 60%);overflow-x:hidden}

    /* Top bar */
    #topbar{position:sticky;top:0;z-index:100;background:rgba(9,9,15,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
    .tbl{display:flex;align-items:center;gap:10px}
    .logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--acc-d));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .app-t{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff}
    #drv-display{font-size:13px;color:var(--sub);margin-top:2px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #btn-logout{background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;padding:9px 13px;cursor:pointer;transition:border-color .2s,color .2s}
    #btn-logout:active{border-color:var(--red);color:var(--red)}

    /* Main scroll */
    #main{flex:1;overflow-y:auto;padding:16px 15px calc(28px + var(--sb));display:flex;flex-direction:column;gap:14px}

    /* Cards */
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 17px;animation:up .3s ease}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .clabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);margin-bottom:14px}

    /* Status card */
    #status-row{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 15px;margin-bottom:12px}
    .sdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;transition:all .3s}
    .dot-available{background:var(--green);box-shadow:0 0 9px rgba(16,185,129,.55)}
    .dot-busy{background:var(--orange);box-shadow:0 0 9px rgba(245,158,11,.55)}
    .dot-offline{background:var(--sub)}
    #status-text{font-weight:700;font-size:16px}
    #gps-text{margin-left:auto;font-size:12px;color:var(--sub)}
    .btn-row{display:flex;gap:10px}
    .act-btn{flex:1;padding:13px;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .12s}
    .act-btn:active{transform:scale(.97)}.act-btn:disabled{opacity:.35;cursor:not-allowed}
    .avail-btn{background:var(--green);color:#fff}
    .busy-btn{background:var(--orange);color:#fff}

    /* Active ride card */
    #active-card{display:none;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 17px;animation:up .35s ease}
    #active-card.show{display:block}

    .ride-status-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);color:#818cf8;border-radius:20px;padding:6px 13px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
    .pulse{width:7px;height:7px;background:var(--blue);border-radius:50%;animation:pulse 1.4s ease infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

    /* Customer phone inside active card */
    .active-phone{
      display:flex;align-items:center;gap:8px;width:100%;
      color:var(--green);font-size:17px;font-weight:700;text-decoration:none;
      background:rgba(16,185,129,.1);border:1.5px solid rgba(16,185,129,.3);
      border-radius:12px;padding:13px 15px;margin-bottom:14px;
    }
    .active-phone:active{background:rgba(16,185,129,.2)}

    .route-box{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:14px}
    .rrow{display:flex;align-items:flex-start;gap:11px;padding:5px 0}
    .rico{font-size:1rem;margin-top:2px;flex-shrink:0}
    .rlbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sub)}
    .rval{font-size:15px;font-weight:600;color:var(--text);margin-top:2px}
    .rsep{width:2px;height:14px;background:var(--border);margin-left:8px}

    #btn-complete{
      width:100%;border:none;border-radius:13px;
      background:linear-gradient(135deg,var(--green),#059669);
      color:#fff;font-family:'Plus Jakarta Sans',sans-serif;
      font-size:17px;font-weight:700;padding:16px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 6px 20px rgba(16,185,129,.3);transition:opacity .2s,transform .12s;
    }
    #btn-complete:active{transform:scale(.98)}
    #btn-complete:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

    /* History */
    .h-empty{text-align:center;color:var(--sub);font-size:14px;padding:20px 0}
    .h-item{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px 14px;margin-bottom:10px}
    .h-rt{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:15px;font-weight:600;margin-bottom:6px}
    .h-mt{font-size:13px;color:var(--sub)}

    /* ═══════════════════════════════
       RIDE POPUP
    ═══════════════════════════════ */
    #ride-popup-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.82);
      display:flex;align-items:flex-end;justify-content:center;
      z-index:9999;animation:fadeIn .2s ease;
      padding-bottom:var(--sb);
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    #ride-popup-box{
      background:var(--card);border:1px solid var(--border);
      border-radius:24px 24px 0 0;width:100%;max-width:480px;
      padding:20px 20px calc(20px + var(--sb));
      box-shadow:0 -10px 50px rgba(0,0,0,.5);
      animation:slideUp .35s cubic-bezier(.34,1.3,.64,1);
      max-height:90vh;overflow-y:auto;
    }
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

    .popup-handle{width:40px;height:4px;background:var(--muted);border-radius:4px;margin:0 auto 18px}
    .popup-type{display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .popup-type .icon{font-size:1.5rem}
    .popup-type h2{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:#fff}
    .popup-type .new-badge{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--green);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;animation:blink 1s ease infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

    /* Phone in popup — biggest element */
    .popup-phone{
      display:flex;align-items:center;gap:10px;width:100%;
      color:var(--green);font-size:18px;font-weight:800;text-decoration:none;
      background:rgba(16,185,129,.12);border:2px solid rgba(16,185,129,.4);
      border-radius:14px;padding:15px 16px;margin-bottom:14px;
      transition:background .2s;
    }
    .popup-phone:active{background:rgba(16,185,129,.22)}

    .popup-section{background:var(--surface);border-radius:13px;padding:13px 14px;margin-bottom:12px}
    .popup-row{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
    .popup-row:last-child{margin-bottom:0}
    .plbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sub)}
    .pval{font-size:15px;font-weight:600;color:var(--text);margin-top:2px}
    .sched-block{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.22);border-radius:11px;padding:11px 13px;margin-bottom:12px}
    .sched-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#818cf8}
    .sched-val{font-size:15px;font-weight:700;color:#c7d2fe;margin-top:3px}

    .popup-actions{display:flex;gap:10px;margin-top:4px}
    .pop-accept{flex:1;border:none;border-radius:13px;background:linear-gradient(135deg,var(--green),#059669);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;padding:16px;cursor:pointer;transition:opacity .2s}
    .pop-accept:disabled{opacity:.45;cursor:not-allowed}
    .pop-skip{background:transparent;border:1.5px solid var(--border);border-radius:13px;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;padding:16px 18px;cursor:pointer;transition:border-color .2s,color .2s}
    .pop-skip:active{border-color:var(--red);color:var(--red)}

    /* Toast */
    #toast{
      position:fixed;bottom:calc(20px + var(--sb));left:50%;
      transform:translateX(-50%) translateY(90px);
      background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);
      border-radius:13px;padding:13px 22px;font-size:14px;font-weight:600;
      color:var(--text);z-index:9998;white-space:nowrap;
      transition:transform .35s cubic-bezier(.34,1.4,.64,1);
    }
    #toast.show{transform:translateX(-50%) translateY(0)}


    @media (max-width: 600px) {
  :root {
    /* Slightly increase base font size for better readability */
    font-size: 17px; 
  }

  /* 1. Make headers & titles pop more */
  .app-n, .app-t, .logo-t h1 {
    font-size: 20px !important;
    letter-spacing: -0.02em;
  }

  /* 2. Bold, readable labels (previously 11px) */
  .clabel, .flabel, .rlbl, .l {
    font-size: 13px !important;
    font-weight: 800 !important;
    letter-spacing: 0.05em !important;
    color: #a5b4fc !important; /* Slightly brighter blue-tint for visibility */
    margin-bottom: 10px !important;
  }

  /* 3. Larger Tap Targets (Minimum 48px height for accessibility) */
  .act-btn, .btn-go, .dis-btn, .inp, #btn-complete {
    height: 54px !important; /* Standard "easy-tap" height */
    font-size: 17px !important;
    border-radius: 16px !important; /* Softer, modern look */
  }

  /* 4. Increase Card Spacing */
  #main, .panel {
    padding: 20px 18px !important;
    gap: 18px !important;
  }

  .card {
    padding: 24px 20px !important;
    border-width: 1.5px !important; /* Slightly thicker border for "bold" feel */
  }

  /* 5. Prominent Ride Details (Driver/Customer info) */
  .rval, .rrow, #status-text {
    font-size: 18px !important;
    font-weight: 700 !important;
  }
}
    
  </style>
</head>
<body>

<div id="topbar">
  <div class="tbl">
    <div class="logo">🚖</div>
    <div>
      <div class="app-t">Driver Panel</div>
      <div id="drv-display">Loading…</div>
    </div>
  </div>
  <button id="btn-logout">Sign Out</button>
</div>

<div id="main">

  <!-- Status card -->
  <div class="card">
    <div class="clabel">Your Status</div>
    <div id="status-row">
      <div class="sdot dot-offline" id="sdot"></div>
      <span id="status-text">Connecting…</span>
      <span id="gps-text">📡 GPS off</span>
    </div>
    <div class="btn-row">
      <button class="act-btn avail-btn" id="btn-avail" disabled>✅ Available</button>
      <button class="act-btn busy-btn"  id="btn-busy"  disabled>🔴 Busy</button>
    </div>
  </div>

  <!-- Active ride card -->
  <div id="active-card">
    <div class="clabel">Active Ride</div>
    <div class="ride-status-badge"><div class="pulse"></div>In Progress</div>

    <!-- Customer phone prominently displayed -->
    <a class="active-phone" id="active-phone" href="#">📞 Loading…</a>

    <div class="route-box">
      <div class="rrow"><div class="rico">📍</div><div><div class="rlbl">Pickup</div><div class="rval" id="act-pickup">—</div></div></div>
      <div class="rsep"></div>
      <div class="rrow"><div class="rico">🏁</div><div><div class="rlbl">Drop</div><div class="rval" id="act-drop">—</div></div></div>
    </div>
    <button id="btn-complete">✅ Ride Completed — Drop Done</button>
  </div>

  <!-- History -->
  <div class="card" id="hist-card">
    <div class="clabel">My Ride History <span id="h-cnt" style="color:var(--sub)"></span></div>
    <div id="h-list"><div class="h-empty">No completed rides yet.</div></div>
  </div>

</div><!-- /main -->

<div id="toast"></div>

<script type="module">
  import { requireAuth, logoutUser, db } from "./auth.js";
  import {
    collection, doc,
    setDoc, updateDoc, getDoc, runTransaction,
    onSnapshot, query, where, orderBy, serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const merge = { merge: true };

  // ── Auth ───────────────────────────────────────────────────
  const { user, driverId, email, name, phone } = await requireAuth("driver");
  console.log("[Driver] Ready | driverId:", driverId, "| email:", email);

  document.getElementById("drv-display").textContent = name || email;
  document.getElementById("btn-avail").disabled = false;
  document.getElementById("btn-busy").disabled  = false;

  // Set online
  await setDoc(doc(db, "drivers", driverId), {
    status: "available", email: email||"", name: name||"", phone: phone||"",
    lastUpdated: serverTimestamp(),
  }, merge);
  updateStatusUI("available");

  startGPS();
  startRideListener();
  startHistoryListener();
  startAdvanceChecker();

  // ── Toast ───────────────────────────────────────────────────
  function toast(msg, color="var(--accent)") {
    const el=document.getElementById("toast");
    el.textContent=msg; el.style.borderLeftColor=color;
    el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),3200);
  }

  // ── Logout ──────────────────────────────────────────────────
  document.getElementById("btn-logout").addEventListener("click", async () => {
    try { await setDoc(doc(db,"drivers",driverId),{status:"offline"},merge); } catch(e){}
    await logoutUser(); window.location.href="login.html";
  });

  // ── Status buttons ──────────────────────────────────────────
  document.getElementById("btn-avail").addEventListener("click", async () => {
    await setDoc(doc(db,"drivers",driverId),{status:"available",lastUpdated:serverTimestamp()},merge);
    updateStatusUI("available");
  });
  document.getElementById("btn-busy").addEventListener("click", async () => {
    await setDoc(doc(db,"drivers",driverId),{status:"busy",lastUpdated:serverTimestamp()},merge);
    updateStatusUI("busy");
  });

  function updateStatusUI(st) {
    document.getElementById("sdot").className = "sdot dot-"+st;
    document.getElementById("status-text").textContent = st.charAt(0).toUpperCase()+st.slice(1);
  }

  // ── GPS ─────────────────────────────────────────────────────
  function startGPS() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(
      ({coords:{latitude:lat,longitude:lng}}) => {
        setDoc(doc(db,"drivers",driverId),{location:{lat,lng},lastUpdated:serverTimestamp()},merge);
        document.getElementById("gps-text").textContent=`📡 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      },
      ()=>{ document.getElementById("gps-text").textContent="📡 GPS error"; },
      {enableHighAccuracy:true,maximumAge:5000,timeout:15000}
    );
  }

  // ── Ride listeners ──────────────────────────────────────────
  const shownRides = new Set();
  let activeRideId = null;

  function startRideListener() {
    // 1. BROADCAST rides — all drivers see these
    onSnapshot(
      query(collection(db,"rides"), where("status","==","broadcast")),
      snap => {
        snap.docChanges().forEach(({type, doc:d}) => {
          const ride = d.data();
          if ((type==="added"||type==="modified") && ride.status==="broadcast" && !shownRides.has(d.id)) {
            shownRides.add(d.id);
            showRidePopup(d.id, ride);
          }
          // Auto-dismiss if claimed by someone else
          if (type==="modified" && ride.status!=="broadcast") {
            const popup=document.getElementById("ride-popup");
            if (popup && popup.dataset.rideId===d.id) {
              closePopup(d.id);
              toast("⚡ Ride claimed by another driver","var(--sub)");
            }
          }
        });
      },
      err=>console.error("[Broadcast]",err.message)
    );

    // 2. ONGOING rides for THIS driver
    onSnapshot(
      query(collection(db,"rides"), where("driverId","==",driverId), where("status","==","ongoing")),
      snap => {
        if (!snap.empty) {
          const d=snap.docs[0]; activeRideId=d.id;
          const r=d.data();
          document.getElementById("act-pickup").textContent = r.pickup||"—";
          document.getElementById("act-drop").textContent   = r.drop  ||"—";
          // Show customer phone prominently
          const ph=r.customerPhone||"";
          const phoneEl=document.getElementById("active-phone");
          if(ph){phoneEl.textContent="📞 "+ph;phoneEl.href="tel:"+ph;}
          else  {phoneEl.textContent="No phone provided";phoneEl.href="#";}
          document.getElementById("active-card").classList.add("show");
        } else {
          document.getElementById("active-card").classList.remove("show");
          activeRideId=null;
        }
      },
      err=>console.error("[Ongoing]",err.message)
    );
  }

  // ── Complete ride ───────────────────────────────────────────
  document.getElementById("btn-complete").addEventListener("click", async () => {
    if (!activeRideId) return;
    const btn=document.getElementById("btn-complete");
    btn.disabled=true; btn.textContent="Completing…";
    try {
      const snap=await getDoc(doc(db,"rides",activeRideId));
      await updateDoc(doc(db,"rides",activeRideId),{status:"completed",completedAt:serverTimestamp()});
      await setDoc(doc(db,"drivers",driverId),{status:"available",lastUpdated:serverTimestamp()},merge);
      if(snap.exists()&&snap.data().requestId){
        try{await updateDoc(doc(db,"ride_requests",snap.data().requestId),{status:"completed",completedAt:serverTimestamp()});}catch(e){}
      }
      updateStatusUI("available");
      toast("🎉 Ride completed!","var(--green)");
    }catch(e){console.error("[Complete]",e.message);}
    btn.disabled=false; btn.textContent="✅ Ride Completed — Drop Done";
  });

  // ── Popup ───────────────────────────────────────────────────
  function showRidePopup(rideId, ride) {
    document.getElementById("ride-popup")?.remove();

    const popup=document.createElement("div");
    popup.id="ride-popup"; popup.dataset.rideId=rideId;

    const hasSched=ride.isScheduled&&ride.scheduledAt;
    const schedBlock=hasSched?`
      <div class="sched-block">
        <div class="sched-label">📅 Scheduled for</div>
        <div class="sched-val">${new Date(ride.scheduledAt).toLocaleString([],{dateStyle:"medium",timeStyle:"short"})}</div>
      </div>`:"";;

    popup.innerHTML=`
      <div id="ride-popup-overlay">
        <div id="ride-popup-box">
          <div class="popup-handle"></div>
          <div class="popup-type">
            <span class="icon">🚖</span>
            <h2>${hasSched?"Scheduled Ride":"New Ride!"}</h2>
            <span class="new-badge">Live</span>
          </div>

          ${ride.customerPhone?`<a class="popup-phone" href="tel:${ride.customerPhone}">📞 ${ride.customerPhone} — Call Customer</a>`:`<div style="font-size:14px;color:var(--sub);margin-bottom:12px">No phone provided</div>`}

          ${ride.customerName?`<div class="popup-section"><div class="popup-row"><div class="plbl">👤 Customer</div><div class="pval">${ride.customerName}</div></div></div>`:""}

          ${schedBlock}

          <div class="popup-section">
            <div class="popup-row"><div class="plbl">📍 Pickup</div><div class="pval">${ride.pickup||"N/A"}</div></div>
            <div class="popup-row"><div class="plbl">🏁 Drop</div><div class="pval">${ride.drop||"N/A"}</div></div>
          </div>

          <div class="popup-actions">
            <button class="pop-accept" id="pop-accept">✅ Accept Ride</button>
            <button class="pop-skip"   id="pop-skip">Skip</button>
          </div>
        </div>
      </div>`;

    document.body.appendChild(popup);

    // Accept — Firestore transaction prevents race condition
    document.getElementById("pop-accept").addEventListener("click", async () => {
      const btn=document.getElementById("pop-accept");
      btn.disabled=true; btn.textContent="Claiming…";

      try {
        let claimed=false;
        await runTransaction(db, async tx => {
          const snap=await tx.get(doc(db,"rides",rideId));
          if(!snap.exists())throw new Error("Ride not found");
          if(snap.data().status!=="broadcast"){claimed=true;return;}
          tx.update(doc(db,"rides",rideId),{
            status:"ongoing", driverId, driverEmail:email||driverId,
          });
        });

        if(claimed){
          closePopup(rideId);
          toast("⚡ Claimed by someone else","var(--sub)");
          return;
        }

        await setDoc(doc(db,"drivers",driverId),{status:"busy"},merge);
        if(ride.requestId){
          try{await updateDoc(doc(db,"ride_requests",ride.requestId),{status:"ongoing",driverId,driverEmail:email||driverId});}catch(e){}
        }
        updateStatusUI("busy");
        closePopup(rideId);
        toast("✅ Ride accepted!","var(--green)");

      }catch(err){
        console.error("[Accept tx]",err.message);
        btn.disabled=false; btn.textContent="✅ Accept Ride";
      }
    });

    // Skip — just dismiss, ride stays broadcast for others
    document.getElementById("pop-skip").addEventListener("click", () => closePopup(rideId));
  }

  function closePopup(rideId) {
    const p=document.getElementById("ride-popup");
    if(p){p.style.opacity="0";p.style.transition="opacity .25s";setTimeout(()=>p.remove(),250);}
    shownRides.delete(rideId);
  }

  // ── History ─────────────────────────────────────────────────
  function startHistoryListener() {
    onSnapshot(
      query(collection(db,"rides"),where("driverId","==",driverId),where("status","==","completed"),orderBy("completedAt","desc")),
      snap=>{
        const list=document.getElementById("h-list");
        document.getElementById("h-cnt").textContent=snap.size?`(${snap.size})`:"";
        list.innerHTML="";
        if(snap.empty){list.innerHTML='<div class="h-empty">No completed rides yet.</div>';return;}
        snap.forEach(d=>{
          const r=d.data(),date=r.completedAt?.toDate?r.completedAt.toDate().toLocaleString():"—";
          const item=document.createElement("div");item.className="h-item";
          item.innerHTML=`
            <div class="h-rt">
              <span>📍 ${r.pickup||"—"}</span>
              <span style="color:var(--muted)">→</span>
              <span>🏁 ${r.drop||"—"}</span>
            </div>
            <div class="h-mt">
              ${r.customerPhone?`<div><a href="tel:${r.customerPhone}" style="color:var(--green);font-weight:700;text-decoration:none">📞 ${r.customerPhone}</a></div>`:""}
              <div>🕐 ${date}</div>
            </div>`;
          list.appendChild(item);
        });
      },
      err=>console.error("[History]",err.message)
    );
  }

  // ── Advance booking checker ─────────────────────────────────
  const REMIND_MINS=30, notified=new Set();
  function startAdvanceChecker(){checkScheduled();setInterval(checkScheduled,60000);}

  async function checkScheduled(){
    try{
      const {getDocs}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const snap=await getDocs(query(collection(db,"rides"),where("driverId","==",driverId),where("status","==","ongoing"),where("isScheduled","==",true)));
      const now=Date.now();
      snap.forEach(d=>{
        const r=d.data();
        if(!r.scheduledAt||notified.has(d.id))return;
        const diff=(new Date(r.scheduledAt)-now)/60000;
        if(diff>=0&&diff<=REMIND_MINS){notified.add(d.id);showReminder(d.id,r,Math.round(diff));}
      });
    }catch(e){console.warn("[AdvanceCheck]",e.message);}
  }

  function showReminder(rideId, ride, minsLeft){
    document.getElementById("sched-reminder")?.remove();
    const el=document.createElement("div");el.id="sched-reminder";
    el.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:10000;font-family:'Plus Jakarta Sans',sans-serif;padding:20px";
    el.innerHTML=`
      <div style="background:#18181f;border:2px solid #6366f1;border-radius:22px;width:100%;max-width:360px;padding:24px 20px;box-shadow:0 20px 60px rgba(99,102,241,.3)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <div style="font-size:1.8rem">⏰</div>
          <div>
            <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#fff">Upcoming Ride!</div>
            <div style="font-size:13px;color:#818cf8;margin-top:2px">In ${minsLeft} minute${minsLeft!==1?"s":""}</div>
          </div>
        </div>
        ${ride.customerPhone?`<a href="tel:${ride.customerPhone}" style="display:flex;align-items:center;gap:8px;color:var(--green);font-size:17px;font-weight:800;text-decoration:none;background:rgba(16,185,129,.12);border:1.5px solid rgba(16,185,129,.35);border-radius:12px;padding:13px 15px;margin-bottom:14px">📞 ${ride.customerPhone}</a>`:""}
        <div style="background:#111118;border-radius:12px;padding:13px;margin-bottom:14px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#818cf8;margin-bottom:6px">📅 Scheduled for</div>
          <div style="font-size:15px;font-weight:700;color:#c7d2fe">${new Date(ride.scheduledAt).toLocaleString([],{dateStyle:"medium",timeStyle:"short"})}</div>
          <div style="margin-top:10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4b5a72;margin-bottom:4px">📍 Pickup</div>
          <div style="font-size:14px;font-weight:600;color:#f1f1f8">${ride.pickup||"—"}</div>
        </div>
        <button onclick="document.getElementById('sched-reminder').remove()" style="width:100%;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;padding:15px;cursor:pointer">Got it — I'll be ready 👍</button>
      </div>`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5*60*1000);
  }
</script>
</body>
</html>
