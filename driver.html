<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Driver Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #080c14;
      --surface: #0f1623;
      --border:  #1c2535;
      --accent:  #f97316;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger:  #ef4444;
      --blue:    #3b82f6;
      --muted:   #4b5a72;
      --text:    #e2ecf8;
      --subtext: #8496b0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
      background-image: radial-gradient(circle at 1px 1px, #1c2535 1px, transparent 0);
      background-size: 32px 32px;
    }
    #topbar {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    #topbar h1 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: #fff; }
    #driver-name-display { font-size: 0.78rem; color: var(--subtext); }
    #btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--subtext);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      padding: 7px 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #btn-logout:hover { border-color: var(--danger); color: var(--danger); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 20px;
      width: 90%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 2px;
    }
    #status-display {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 11px; padding: 13px 15px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%; flex-shrink: 0; transition: background 0.3s;
    }
    .dot-available { background: var(--success); box-shadow: 0 0 8px rgba(34,197,94,0.5); }
    .dot-busy      { background: var(--warning); box-shadow: 0 0 8px rgba(245,158,11,0.5); }
    .dot-offline   { background: var(--muted); }
    #status-text { font-weight: 600; font-size: 0.92rem; }
    #gps-text { margin-left: auto; font-size: 0.72rem; color: var(--subtext); }
    .btn-row { display: flex; gap: 10px; }
    button.action-btn {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    button.action-btn:active  { transform: scale(0.97); }
    button.action-btn:disabled{ opacity: 0.35; cursor: not-allowed; }
    .btn-available { background: var(--success); color: #fff; }
    .btn-busy      { background: var(--warning); color: #fff; }

    /* Active ride */
    #active-ride-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 20px;
      width: 90%; max-width: 420px;
      flex-direction: column; gap: 14px;
      animation: fadeUp 0.4s ease;
      margin-top: 16px;
    }
    #active-ride-card.visible { display: flex; }
    .ride-route-display {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .route-stop { display: flex; align-items: flex-start; gap: 12px; }
    .route-icon { font-size: 1rem; margin-top: 1px; }
    .route-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .route-value { font-size: 0.92rem; font-weight: 600; color: var(--text); margin-top: 1px; }
    .route-line { width: 2px; height: 18px; background: var(--border); margin-left: 8px; }
    #btn-complete-ride {
      background: linear-gradient(135deg, var(--success), #16a34a);
      color: #fff; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700;
      padding: 15px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(34,197,94,0.3);
    }
    #btn-complete-ride:hover  { opacity: 0.92; box-shadow: 0 6px 20px rgba(34,197,94,0.4); }
    #btn-complete-ride:active { transform: scale(0.98); }
    .ride-status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.25);
      color: var(--blue); border-radius: 20px; padding: 5px 12px;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .pulse {
      width: 7px; height: 7px; background: var(--blue); border-radius: 50%;
      animation: pulse 1.4s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* History */
    #history-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 22px 20px;
      width: 90%; max-width: 420px;
      animation: fadeUp 0.5s ease; margin-top: 16px;
    }
    .history-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }
    .history-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 13px; margin-bottom: 8px; font-size: 0.85rem;
    }
    .history-route { font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
    .history-meta  { font-size: 0.72rem; color: var(--subtext); }
    .history-empty { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 16px 0; }

    /* Popup */
    #ride-popup-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #ride-popup-box {
      background: var(--surface); border: 2px solid var(--accent);
      border-radius: 20px; width: 90%; max-width: 360px;
      padding: 26px 22px;
      box-shadow: 0 20px 60px rgba(249,115,22,0.25);
      animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.93); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    #ride-popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .popup-icon { font-size: 1.7rem; }
    #ride-popup-header h2 { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800; color: #fff; }
    #ride-popup-body { background: var(--bg); border-radius: 12px; padding: 15px; margin-bottom: 18px; }
    .popup-stop { display: flex; flex-direction: column; gap: 1px; }
    .popup-stop .lbl { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .popup-stop .val { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .popup-arrow { text-align: center; color: var(--accent); font-size: 1.2rem; margin: 8px 0; }
    #ride-popup-actions { display: flex; gap: 10px; }
    .popup-btn {
      flex: 1; padding: 13px; border: none; border-radius: 11px;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .popup-btn:active { transform: scale(0.97); }
    .popup-btn.accept { background: var(--success); color: #fff; }
    .popup-btn.reject { background: var(--danger);  color: #fff; }
    #ride-popup.fade-out #ride-popup-overlay { animation: fadeOut 0.25s ease forwards; }
    @keyframes fadeOut { to { opacity: 0; } }
  </style>
</head>
<body>

<div id="topbar">
  <div class="topbar-left">
    <div class="logo-icon">🚖</div>
    <div>
      <h1>Driver Panel</h1>
      <div id="driver-name-display">Loading…</div>
    </div>
  </div>
  <button id="btn-logout">Sign Out</button>
</div>

<div class="card">
  <div class="card-title">Your Status</div>
  <div id="status-display">
    <div class="status-dot dot-offline" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
    <span id="gps-text">📡 GPS off</span>
  </div>
  <div class="btn-row">
    <button class="action-btn btn-available" id="btn-avail" disabled>✅ Available</button>
    <button class="action-btn btn-busy"      id="btn-busy"  disabled>🔴 Busy</button>
  </div>
</div>

<div id="active-ride-card">
  <div class="card-title">Active Ride</div>
  <div class="ride-status-badge"><div class="pulse"></div>In Progress</div>
  <div class="ride-route-display">
    <div class="route-stop">
      <div class="route-icon">📍</div>
      <div>
        <div class="route-label">Pickup</div>
        <div class="route-value" id="active-pickup">—</div>
      </div>
    </div>
    <div class="route-line"></div>
    <div class="route-stop">
      <div class="route-icon">🏁</div>
      <div>
        <div class="route-label">Drop</div>
        <div class="route-value" id="active-drop">—</div>
      </div>
    </div>
  </div>
  <button id="btn-complete-ride">✅ Ride Completed — Drop Done</button>
</div>

<div id="history-card">
  <div class="history-header">
    <div class="card-title" style="margin:0">My Ride History</div>
    <span id="history-count" style="font-size:0.75rem;color:var(--subtext)">0 rides</span>
  </div>
  <div id="history-list">
    <div class="history-empty">No completed rides yet.</div>
  </div>
</div>

<script type="module">
  import { requireAuth, logoutUser, db } from "./auth.js";
  import {
    collection, doc,
    setDoc, updateDoc, getDoc, runTransaction,
    onSnapshot, query, where, orderBy, serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const merge = { merge: true };

  // ── Auth ──────────────────────────────────────────────
  const { user, driverId, email } = await requireAuth("driver");
  console.log("[Driver] Ready | driverId:", driverId, "| email:", email);

  document.getElementById("driver-name-display").textContent = email || driverId;
  document.getElementById("btn-avail").disabled = false;
  document.getElementById("btn-busy").disabled  = false;

  // Safe upsert — won't throw if doc missing
  await setDoc(doc(db, "drivers", driverId), {
    status: "available", email: email||"", lastUpdated: serverTimestamp()
  }, merge);

  updateStatusUI("available");
  startGPS();
  startRideListener();
  startHistoryListener();
  startAdvanceBookingChecker(); // ← new: checks every minute for upcoming scheduled rides

  document.getElementById("btn-logout").addEventListener("click", async () => {
    try { await setDoc(doc(db,"drivers",driverId),{status:"offline"},merge); } catch(e){}
    await logoutUser(); window.location.href="login.html";
  });

  document.getElementById("btn-avail").addEventListener("click", async () => {
    await setDoc(doc(db,"drivers",driverId),{status:"available",lastUpdated:serverTimestamp()},merge);
    updateStatusUI("available");
  });
  document.getElementById("btn-busy").addEventListener("click", async () => {
    await setDoc(doc(db,"drivers",driverId),{status:"busy",lastUpdated:serverTimestamp()},merge);
    updateStatusUI("busy");
  });

  function updateStatusUI(status) {
    document.getElementById("status-dot").className = "status-dot dot-" + status;
    document.getElementById("status-text").textContent = status.charAt(0).toUpperCase() + status.slice(1);
  }

  function startGPS() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(
      ({ coords: { latitude: lat, longitude: lng } }) => {
        setDoc(doc(db, "drivers", driverId), { location: { lat, lng }, lastUpdated: serverTimestamp() }, merge);
        document.getElementById("gps-text").textContent = `📡 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      },
      (err) => { document.getElementById("gps-text").textContent = "📡 GPS error"; },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    );
  }

  const shownRideIds = new Set();
  let activeRideId   = null;

  function startRideListener() {
    // ── BROADCAST rides ────────────────────────────────────────────────────
    // Listens for rides with status:"broadcast" (driverId is null).
    // ALL drivers see these — customer phone number shown prominently.
    // Accept uses a Firestore transaction so only ONE driver can claim it.
    onSnapshot(
      query(collection(db, "rides"), where("status", "==", "broadcast")),
      (snap) => {
        snap.docChanges().forEach(({ type, doc: d }) => {
          const ride = d.data();
          // Show popup for new broadcast rides (not already shown, not already claimed)
          if (
            (type === "added" || type === "modified") &&
            ride.status === "broadcast" &&
            !shownRideIds.has(d.id)
          ) {
            shownRideIds.add(d.id);
            showRidePopup(d.id, ride);
          }
          // If someone else claimed it — auto-dismiss popup if still showing
          if (type === "modified" && ride.status !== "broadcast") {
            const popup = document.getElementById("ride-popup");
            if (popup && popup.dataset.rideId === d.id) {
              closePopup(d.id);
              showClaimedToast();
            }
          }
        });
      },
      (err) => console.error("[Broadcast listener]", err.message)
    );

    // ── ONGOING rides for THIS driver → show Complete button ───────────────
    onSnapshot(
      query(collection(db, "rides"), where("driverId", "==", driverId), where("status", "==", "ongoing")),
      (snap) => {
        if (!snap.empty) {
          const d = snap.docs[0];
          activeRideId = d.id;
          const r = d.data();
          document.getElementById("active-pickup").textContent = r.pickup || "—";
          document.getElementById("active-drop").textContent   = r.drop   || "—";
          document.getElementById("active-ride-card").classList.add("visible");
        } else {
          document.getElementById("active-ride-card").classList.remove("visible");
          activeRideId = null;
        }
      },
      (err) => console.error("[Ongoing listener]", err.message)
    );
  }

  // Small toast when another driver claimed the ride first
  function showClaimedToast() {
    const t = document.createElement("div");
    t.textContent = "⚡ Ride claimed by another driver";
    t.style.cssText = `
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:#18181f;border:1px solid #242430;border-left:3px solid #f59e0b;
      border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;
      color:#f1f1f8;z-index:9999;white-space:nowrap;
      animation:fadeUp .3s ease;
    `;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  document.getElementById("btn-complete-ride").addEventListener("click", async () => {
    if (!activeRideId) return;
    const btn = document.getElementById("btn-complete-ride");
    btn.disabled    = true;
    btn.textContent = "Completing…";
    try {
      const rideSnap = await getDoc(doc(db,"rides",activeRideId));
      await updateDoc(doc(db,"rides",activeRideId),{status:"completed",completedAt:serverTimestamp()});
      await setDoc(doc(db,"drivers",driverId),{status:"available",lastUpdated:serverTimestamp()},merge);
      if (rideSnap.exists()&&rideSnap.data().requestId) {
        try{await updateDoc(doc(db,"ride_requests",rideSnap.data().requestId),{status:"completed",completedAt:serverTimestamp()});}catch(e){}
      }
      updateStatusUI("available");
    } catch(e){console.error("[Complete]",e.message);}
    btn.disabled=false;btn.textContent="✅ Ride Completed — Drop Done";
  });

  // ══════════════════════════════════════════════════════
  // ADVANCE BOOKING NOTIFICATION SYSTEM
  // Runs every 60 seconds. If an accepted scheduled ride is
  // within REMIND_MINS minutes, shows a reminder popup.
  // ══════════════════════════════════════════════════════
  const REMIND_MINS   = 30;  // remind this many minutes before
  const notifiedRides = new Set(); // prevent repeat notifications

  function startAdvanceBookingChecker() {
    checkScheduledRides(); // run immediately on page load
    setInterval(checkScheduledRides, 60_000); // then every minute
  }

  async function checkScheduledRides() {
    try {
      const snap = await (await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"))
        .getDocs(
          query(
            collection(db,"rides"),
            where("driverId","==",driverId),
            where("status","==","assigned"),
            where("isScheduled","==",true)
          )
        );

      const now = Date.now();
      snap.forEach(d => {
        const r = d.data();
        if (!r.scheduledAt || notifiedRides.has(d.id)) return;

        const rideTime = new Date(r.scheduledAt).getTime();
        const diffMins = (rideTime - now) / 60000;

        // Within remind window (e.g. 30 min) and not in the past
        if (diffMins >= 0 && diffMins <= REMIND_MINS) {
          notifiedRides.add(d.id);
          showScheduledReminder(d.id, r, Math.round(diffMins));
        }
      });
    } catch(e) {
      console.warn("[AdvanceCheck]", e.message);
    }
  }

  function showScheduledReminder(rideId, ride, minsLeft) {
    // Remove any existing reminder
    document.getElementById("sched-reminder")?.remove();

    const el = document.createElement("div");
    el.id = "sched-reminder";
    el.style.cssText = `
      position:fixed;inset:0;background:rgba(0,0,0,.8);
      display:flex;align-items:center;justify-content:center;
      z-index:10000;animation:fadeIn .25s ease;
      font-family:'Plus Jakarta Sans',sans-serif;
    `;
    el.innerHTML = `
      <div style="
        background:#1a1a24;border:2px solid #6366f1;border-radius:22px;
        width:92%;max-width:360px;padding:26px 22px;
        box-shadow:0 20px 60px rgba(99,102,241,.35);
        animation:slideUp .35s cubic-bezier(.34,1.56,.64,1);
      ">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
          <div style="font-size:1.8rem">⏰</div>
          <div>
            <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#fff">Upcoming Ride!</div>
            <div style="font-size:.78rem;color:#818cf8;margin-top:2px">Scheduled ride in ${minsLeft} minute${minsLeft!==1?"s":""}</div>
          </div>
        </div>
        <div style="background:#13131a;border-radius:12px;padding:14px;margin-bottom:16px">
          ${ride.customerName?`<div style="margin-bottom:8px"><div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4b5a72">👤 Customer</div><div style="font-size:.9rem;font-weight:600;color:#f0f0f8;margin-top:2px">${ride.customerName}</div></div>`:""}
          ${ride.customerPhone?`<div style="margin-bottom:8px"><div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4b5a72">📞 Phone</div><div style="margin-top:4px"><a href="tel:${ride.customerPhone}" style="color:#10b981;font-weight:700;font-size:.88rem;text-decoration:none;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:7px;padding:5px 10px;display:inline-block">${ride.customerPhone}</a></div></div>`:""}
          <div style="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:8px;padding:8px 10px;margin-bottom:8px">
            <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#818cf8">📅 Ride Time</div>
            <div style="font-size:.9rem;font-weight:700;color:#c7d2fe;margin-top:2px">${new Date(ride.scheduledAt).toLocaleString([],{dateStyle:"medium",timeStyle:"short"})}</div>
          </div>
          <div style="margin-bottom:4px"><div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4b5a72">📍 Pickup</div><div style="font-size:.88rem;font-weight:600;color:#f0f0f8;margin-top:2px">${ride.pickup||"—"}</div></div>
          <div style="width:2px;height:12px;background:#252535;margin:4px 0 4px 6px"></div>
          <div><div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4b5a72">🏁 Drop</div><div style="font-size:.88rem;font-weight:600;color:#f0f0f8;margin-top:2px">${ride.drop||"—"}</div></div>
        </div>
        <button id="sched-ok" style="
          width:100%;border:none;border-radius:12px;
          background:linear-gradient(135deg,#6366f1,#4f46e5);
          color:#fff;font-family:'Plus Jakarta Sans',sans-serif;
          font-size:.95rem;font-weight:700;padding:14px;cursor:pointer;
        ">Got it — I'll be ready 👍</button>
      </div>
    `;
    document.body.appendChild(el);
    document.getElementById("sched-ok").onclick = () => el.remove();
    // Also auto-dismiss after 5 minutes if ignored
    setTimeout(() => el.remove(), 5 * 60 * 1000);
  }

  function showRidePopup(rideId, ride) {
    document.getElementById("ride-popup")?.remove();
    const popup = document.createElement("div");
    popup.id             = "ride-popup";
    popup.dataset.rideId = rideId;  // used to auto-dismiss when claimed by someone else

    // Phone shown as a big tap-to-call button at the top
    const phoneBtn = ride.customerPhone
      ? `<a href="tel:${ride.customerPhone}" style="
            display:flex;align-items:center;justify-content:center;gap:8px;
            background:rgba(16,185,129,.12);border:1.5px solid rgba(16,185,129,.35);
            border-radius:12px;padding:13px;margin-bottom:14px;
            color:#10b981;font-size:17px;font-weight:700;text-decoration:none;
          ">📞 ${ride.customerPhone}</a>`
      : "";

    popup.innerHTML = `
      <div id="ride-popup-overlay">
        <div id="ride-popup-box">
          <div id="ride-popup-header">
            <div class="popup-icon">🚖</div>
            <h2>${ride.isScheduled ? "⏰ Scheduled Ride" : "🔔 New Ride!"}</h2>
          </div>
          <div id="ride-popup-body">
            ${phoneBtn}
            ${ride.customerName ? `<div class="popup-stop" style="margin-bottom:10px"><div class="lbl">👤 Customer</div><div class="val">${ride.customerName}</div></div>` : ""}
            ${ride.isScheduled && ride.scheduledAt ? `<div class="popup-stop" style="margin-bottom:10px;background:rgba(99,102,241,.1);border-radius:10px;padding:10px 12px"><div class="lbl" style="color:#818cf8">📅 Scheduled for</div><div class="val" style="color:#c7d2fe;font-size:15px">${new Date(ride.scheduledAt).toLocaleString([],{dateStyle:"medium",timeStyle:"short"})}</div></div>` : ""}
            <div class="popup-stop" style="margin-bottom:6px"><div class="lbl">📍 Pickup</div><div class="val">${ride.pickup||"N/A"}</div></div>
            <div class="popup-arrow">↓</div>
            <div class="popup-stop"><div class="lbl">🏁 Drop</div><div class="val">${ride.drop||"N/A"}</div></div>
          </div>
          <div id="ride-popup-actions">
            <button class="popup-btn accept" id="pop-accept">✅ Accept Ride</button>
            <button class="popup-btn reject" id="pop-reject">✕ Skip</button>
          </div>
        </div>
      </div>`;
    document.body.appendChild(popup);

    // ── Accept: use Firestore transaction to prevent race condition ──────────
    // If two drivers tap Accept at the same time, only the FIRST one succeeds.
    // The second driver sees "Claimed by another driver" toast instead.
    document.getElementById("pop-accept").onclick = async () => {
      const acceptBtn = document.getElementById("pop-accept");
      acceptBtn.disabled    = true;
      acceptBtn.textContent = "Claiming…";

      try {
        let alreadyClaimed = false;

        await runTransaction(db, async (tx) => {
          const rideSnap = await tx.get(doc(db, "rides", rideId));
          if (!rideSnap.exists()) throw new Error("Ride not found");

          const rideData = rideSnap.data();

          // If status is no longer "broadcast", someone else already claimed it
          if (rideData.status !== "broadcast") {
            alreadyClaimed = true;
            return; // abort transaction gracefully
          }

          // Claim the ride atomically
          tx.update(doc(db, "rides", rideId), {
            status:      "ongoing",
            driverId:    driverId,
            driverEmail: email || driverId,
          });
        });

        if (alreadyClaimed) {
          closePopup(rideId);
          showClaimedToast();
          return;
        }

        // Mark driver busy + update customer request
        await setDoc(doc(db, "drivers", driverId), { status: "busy" }, merge);
        if (ride.requestId) {
          try {
            await updateDoc(doc(db, "ride_requests", ride.requestId), {
              status:      "ongoing",
              driverId:    driverId,
              driverEmail: email || driverId,
            });
          } catch(e) {}
        }
        updateStatusUI("busy");
        closePopup(rideId);

      } catch(err) {
        console.error("[Accept transaction]", err.message);
        acceptBtn.disabled    = false;
        acceptBtn.textContent = "✅ Accept Ride";
      }
    };

    // ── Skip / Reject: just dismiss popup, ride stays broadcast for others ──
    document.getElementById("pop-reject").onclick = () => {
      closePopup(rideId);
      // Don't change Firestore — other drivers can still accept
    };
  }

  function closePopup(rideId) {
    const p = document.getElementById("ride-popup");
    if (p) { p.classList.add("fade-out"); setTimeout(() => p.remove(), 280); }
    shownRideIds.delete(rideId);
  }

  function startHistoryListener() {
    onSnapshot(
      query(collection(db, "rides"), where("driverId", "==", driverId), where("status", "==", "completed"), orderBy("completedAt", "desc")),
      (snap) => {
        const list  = document.getElementById("history-list");
        const count = document.getElementById("history-count");
        count.textContent = `${snap.size} ride${snap.size !== 1 ? "s" : ""}`;
        list.innerHTML = "";
        if (snap.empty) { list.innerHTML = '<div class="history-empty">No completed rides yet.</div>'; return; }
        snap.forEach((d) => {
          const r    = d.data();
          const date = r.completedAt?.toDate ? r.completedAt.toDate().toLocaleString() : "—";
          const item = document.createElement("div");
          item.className = "history-item";
          item.innerHTML = `
            <div class="history-route"><span>📍 ${r.pickup||"—"}</span><span style="color:var(--muted)">→</span><span>🏁 ${r.drop||"—"}</span></div>
            <div class="history-meta">Completed: ${date}</div>`;
          list.appendChild(item);
        });
      }
    );
  }
</script>
</body>
</html>
