<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Driver Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#080c14; --surface:#0f1623; --border:#1c2535;
      --accent:#f97316; --success:#22c55e; --warning:#f59e0b;
      --danger:#ef4444; --blue:#3b82f6;
      --muted:#4b5a72; --text:#e2ecf8; --subtext:#8496b0;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:0 0 40px;
      background-image:radial-gradient(circle at 1px 1px,#1c2535 1px,transparent 0);
      background-size:32px 32px;
    }

    /* Topbar */
    #topbar{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .topbar-left{display:flex;align-items:center;gap:10px}
    .logo-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem}
    #topbar h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#fff}
    #driver-info-display{font-size:0.74rem;color:var(--subtext);margin-top:2px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #btn-logout{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--subtext);font-family:'DM Sans',sans-serif;font-size:0.8rem;padding:7px 13px;cursor:pointer;transition:border-color .2s,color .2s}
    #btn-logout:hover{border-color:var(--danger);color:var(--danger)}

    /* Cards */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px 20px;width:90%;max-width:420px;display:flex;flex-direction:column;gap:12px;animation:fadeUp .4s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px}

    /* Status row */
    #status-display{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:13px 15px}
    .status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:background .3s}
    .dot-available{background:var(--success);box-shadow:0 0 8px rgba(34,197,94,.5)}
    .dot-busy{background:var(--warning);box-shadow:0 0 8px rgba(245,158,11,.5)}
    .dot-offline{background:var(--muted)}
    #status-text{font-weight:600;font-size:.92rem}
    #gps-text{margin-left:auto;font-size:.72rem;color:var(--subtext)}

    .btn-row{display:flex;gap:10px}
    button.action-btn{flex:1;padding:12px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s}
    button.action-btn:active{transform:scale(.97)}
    button.action-btn:disabled{opacity:.35;cursor:not-allowed}
    .btn-available{background:var(--success);color:#fff}
    .btn-busy{background:var(--warning);color:#fff}

    /* Active ride */
    #active-ride-card{display:none;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 20px;width:90%;max-width:420px;flex-direction:column;gap:14px;animation:fadeUp .4s ease;margin-top:16px}
    #active-ride-card.visible{display:flex}
    .ride-route-display{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
    .route-stop{display:flex;align-items:flex-start;gap:12px}
    .route-icon{font-size:1rem;margin-top:1px}
    .route-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
    .route-value{font-size:.92rem;font-weight:600;color:var(--text);margin-top:1px}
    .route-line{width:2px;height:18px;background:var(--border);margin-left:8px}
    #btn-complete-ride{background:linear-gradient(135deg,var(--success),#16a34a);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;padding:15px;cursor:pointer;transition:opacity .2s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(34,197,94,.3)}
    #btn-complete-ride:hover{opacity:.92}
    #btn-complete-ride:active{transform:scale(.98)}
    #btn-complete-ride:disabled{opacity:.45;cursor:not-allowed}
    .ride-status-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:var(--blue);border-radius:20px;padding:5px 12px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
    .pulse{width:7px;height:7px;background:var(--blue);border-radius:50%;animation:pulse 1.4s ease infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

    /* History */
    #history-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 20px;width:90%;max-width:420px;animation:fadeUp .5s ease;margin-top:16px}
    .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .history-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:.85rem}
    .history-route{font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:5px}
    .history-meta{font-size:.72rem;color:var(--subtext)}
    .history-empty{text-align:center;color:var(--muted);font-size:.82rem;padding:16px 0}

    /* Popup */
    #ride-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    #ride-popup-box{background:var(--surface);border:2px solid var(--accent);border-radius:20px;width:90%;max-width:360px;padding:26px 22px;box-shadow:0 20px 60px rgba(249,115,22,.25);animation:slideUp .35s cubic-bezier(.34,1.56,.64,1)}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px) scale(.93)}to{opacity:1;transform:translateY(0) scale(1)}}
    #ride-popup-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .popup-icon{font-size:1.7rem}
    #ride-popup-header h2{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:#fff}
    #ride-popup-body{background:var(--bg);border-radius:12px;padding:15px;margin-bottom:18px}
    .popup-stop{display:flex;flex-direction:column;gap:1px}
    .popup-stop .lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
    .popup-stop .val{font-size:.95rem;font-weight:600;color:var(--text)}
    .popup-arrow{text-align:center;color:var(--accent);font-size:1.2rem;margin:8px 0}
    #ride-popup-actions{display:flex;gap:10px}
    .popup-btn{flex:1;padding:13px;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s}
    .popup-btn:active{transform:scale(.97)}
    .popup-btn.accept{background:var(--success);color:#fff}
    .popup-btn.reject{background:var(--danger);color:#fff}
    #ride-popup.fade-out #ride-popup-overlay{animation:fadeOut .25s ease forwards}
    @keyframes fadeOut{to{opacity:0}}
  </style>
</head>
<body>

<div id="topbar">
  <div class="topbar-left">
    <div class="logo-icon">🚖</div>
    <div>
      <h1>Driver Panel</h1>
      <div id="driver-info-display">Loading…</div>
    </div>
  </div>
  <button id="btn-logout">Sign Out</button>
</div>

<div class="card">
  <div class="card-title">Your Status</div>
  <div id="status-display">
    <div class="status-dot dot-offline" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
    <span id="gps-text">📡 GPS off</span>
  </div>
  <div class="btn-row">
    <button class="action-btn btn-available" id="btn-avail" disabled>✅ Available</button>
    <button class="action-btn btn-busy"      id="btn-busy"  disabled>🔴 Busy</button>
  </div>
</div>

<div id="active-ride-card">
  <div class="card-title">Active Ride</div>
  <div class="ride-status-badge"><div class="pulse"></div>In Progress</div>
  <div class="ride-route-display">
    <div class="route-stop">
      <div class="route-icon">📍</div>
      <div><div class="route-label">Pickup</div><div class="route-value" id="active-pickup">—</div></div>
    </div>
    <div class="route-line"></div>
    <div class="route-stop">
      <div class="route-icon">🏁</div>
      <div><div class="route-label">Drop</div><div class="route-value" id="active-drop">—</div></div>
    </div>
  </div>
  <button id="btn-complete-ride">✅ Ride Completed — Drop Done</button>
</div>

<div id="history-card">
  <div class="history-header">
    <div class="card-title" style="margin:0">My Ride History</div>
    <span id="history-count" style="font-size:.75rem;color:var(--subtext)">0 rides</span>
  </div>
  <div id="history-list">
    <div class="history-empty">No completed rides yet.</div>
  </div>
</div>

<script type="module">
  import { requireAuth, logoutUser, db } from "./auth.js";
  import {
    collection, doc,
    setDoc, updateDoc,        // ← both imported: setDoc for upsert, updateDoc for partial
    onSnapshot, query, where,
    orderBy, serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Auth guard ────────────────────────────────────────
  // requireAuth resolves ONLY after onAuthStateChanged fires
  // and Firestore profile is loaded (or auto-repaired).
  const { user, driverId, email } = await requireAuth("driver");

  console.log("[Driver] Page ready | driverId:", driverId, "| email:", email);

  // Show email in topbar
  document.getElementById("driver-info-display").textContent = email || driverId;

  // Enable status buttons now that we have a valid session
  document.getElementById("btn-avail").disabled = false;
  document.getElementById("btn-busy").disabled  = false;

  // ── Set driver ONLINE ─────────────────────────────────
  // Use setDoc with merge:true instead of updateDoc
  // → works even if the drivers doc doesn't exist yet
  await setDoc(doc(db, "drivers", driverId), {
    status:      "available",
    email:       email || "",
    lastUpdated: serverTimestamp(),
  }, { merge: true });

  updateStatusUI("available");

  startGPS();
  startRideListener();
  startHistoryListener();

  // ── Logout ────────────────────────────────────────────
  document.getElementById("btn-logout").addEventListener("click", async () => {
    try {
      await setDoc(doc(db, "drivers", driverId), { status: "offline" }, { merge: true });
    } catch(e) { /* ignore — logging out anyway */ }
    await logoutUser();
    window.location.href = "login.html";
  });

  // ── Status buttons ────────────────────────────────────
  document.getElementById("btn-avail").addEventListener("click", async () => {
    await setDoc(doc(db, "drivers", driverId), { status: "available", lastUpdated: serverTimestamp() }, { merge: true });
    updateStatusUI("available");
  });

  document.getElementById("btn-busy").addEventListener("click", async () => {
    await setDoc(doc(db, "drivers", driverId), { status: "busy", lastUpdated: serverTimestamp() }, { merge: true });
    updateStatusUI("busy");
  });

  function updateStatusUI(status) {
    document.getElementById("status-dot").className   = "status-dot dot-" + status;
    document.getElementById("status-text").textContent = status.charAt(0).toUpperCase() + status.slice(1);
  }

  // ── GPS ───────────────────────────────────────────────
  function startGPS() {
    if (!navigator.geolocation) {
      document.getElementById("gps-text").textContent = "📡 GPS N/A";
      return;
    }
    navigator.geolocation.watchPosition(
      ({ coords: { latitude: lat, longitude: lng } }) => {
        // merge: true → won't overwrite status
        setDoc(doc(db, "drivers", driverId), {
          location:    { lat, lng },
          lastUpdated: serverTimestamp(),
        }, { merge: true });
        document.getElementById("gps-text").textContent = `📡 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      },
      (err) => {
        console.warn("[GPS]", err.message);
        document.getElementById("gps-text").textContent = "📡 GPS error";
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
  }

  // ── Ride listeners ────────────────────────────────────
  const shownRideIds = new Set();
  let activeRideId   = null;

  function startRideListener() {
    // 1. Assigned rides → show popup
    onSnapshot(
      query(
        collection(db, "rides"),
        where("driverId", "==", driverId),
        where("status",   "==", "assigned")
      ),
      (snap) => {
        snap.docChanges().forEach(({ type, doc: d }) => {
          const ride = d.data();
          if (
            (type === "added" || type === "modified") &&
            ride.status === "assigned" &&
            !shownRideIds.has(d.id)
          ) {
            shownRideIds.add(d.id);
            showRidePopup(d.id, ride);
          }
        });
      },
      (err) => console.error("[Rides:assigned]", err.message)
    );

    // 2. Ongoing rides → show Complete button
    onSnapshot(
      query(
        collection(db, "rides"),
        where("driverId", "==", driverId),
        where("status",   "==", "ongoing")
      ),
      (snap) => {
        if (!snap.empty) {
          const d = snap.docs[0];
          activeRideId = d.id;
          const r = d.data();
          document.getElementById("active-pickup").textContent = r.pickup || "—";
          document.getElementById("active-drop").textContent   = r.drop   || "—";
          document.getElementById("active-ride-card").classList.add("visible");
        } else {
          document.getElementById("active-ride-card").classList.remove("visible");
          activeRideId = null;
        }
      },
      (err) => console.error("[Rides:ongoing]", err.message)
    );
  }

  // ── Complete Ride ─────────────────────────────────────
  document.getElementById("btn-complete-ride").addEventListener("click", async () => {
    if (!activeRideId) return;
    const btn = document.getElementById("btn-complete-ride");
    btn.disabled    = true;
    btn.textContent = "Completing…";
    try {
      await updateDoc(doc(db, "rides",   activeRideId), { status: "completed", completedAt: serverTimestamp() });
      await setDoc(doc(db, "drivers", driverId), { status: "available", lastUpdated: serverTimestamp() }, { merge: true });
      updateStatusUI("available");
    } catch(e) {
      console.error("[Complete]", e.message);
    }
    btn.disabled    = false;
    btn.textContent = "✅ Ride Completed — Drop Done";
  });

  // ── Ride Popup ────────────────────────────────────────
  function showRidePopup(rideId, ride) {
    document.getElementById("ride-popup")?.remove();
    const popup = document.createElement("div");
    popup.id    = "ride-popup";
    popup.innerHTML = `
      <div id="ride-popup-overlay">
        <div id="ride-popup-box">
          <div id="ride-popup-header">
            <div class="popup-icon">🚖</div>
            <h2>New Ride Request</h2>
          </div>
          <div id="ride-popup-body">
            <div class="popup-stop">
              <div class="lbl">📍 Pickup</div>
              <div class="val">${ride.pickup || "N/A"}</div>
            </div>
            <div class="popup-arrow">↓</div>
            <div class="popup-stop">
              <div class="lbl">🏁 Drop</div>
              <div class="val">${ride.drop || "N/A"}</div>
            </div>
          </div>
          <div id="ride-popup-actions">
            <button class="popup-btn accept" id="pop-accept">✅ Accept</button>
            <button class="popup-btn reject" id="pop-reject">❌ Reject</button>
          </div>
        </div>
      </div>`;
    document.body.appendChild(popup);

    document.getElementById("pop-accept").onclick = async () => {
      await updateDoc(doc(db, "rides", rideId), { status: "ongoing" });
      await setDoc(doc(db, "drivers", driverId), { status: "busy" }, { merge: true });
      updateStatusUI("busy");
      closePopup(rideId);
    };

    document.getElementById("pop-reject").onclick = async () => {
      await updateDoc(doc(db, "rides", rideId), { status: "rejected", driverId: null });
      await setDoc(doc(db, "drivers", driverId), { status: "available" }, { merge: true });
      updateStatusUI("available");
      closePopup(rideId);
    };
  }

  function closePopup(rideId) {
    const p = document.getElementById("ride-popup");
    if (p) { p.classList.add("fade-out"); setTimeout(() => p.remove(), 280); }
    shownRideIds.delete(rideId);
  }

  // ── Ride History ──────────────────────────────────────
  function startHistoryListener() {
    onSnapshot(
      query(
        collection(db, "rides"),
        where("driverId", "==", driverId),
        where("status",   "==", "completed"),
        orderBy("completedAt", "desc")
      ),
      (snap) => {
        const list  = document.getElementById("history-list");
        const count = document.getElementById("history-count");
        count.textContent = `${snap.size} ride${snap.size !== 1 ? "s" : ""}`;
        list.innerHTML = "";
        if (snap.empty) {
          list.innerHTML = '<div class="history-empty">No completed rides yet.</div>';
          return;
        }
        snap.forEach((d) => {
          const r    = d.data();
          const date = r.completedAt?.toDate ? r.completedAt.toDate().toLocaleString() : "—";
          const item = document.createElement("div");
          item.className = "history-item";
          item.innerHTML = `
            <div class="history-route">
              <span>📍 ${r.pickup || "—"}</span>
              <span style="color:var(--muted)">→</span>
              <span>🏁 ${r.drop || "—"}</span>
            </div>
            <div class="history-meta">Completed: ${date}</div>`;
          list.appendChild(item);
        });
      },
      (err) => console.error("[History]", err.message)
    );
  }
</script>
</body>
</html>
