<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>RideApp — Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:#252535;
      --accent:#f59e0b;--accent-d:#d97706;
      --blue:#6366f1;--success:#10b981;--warning:#f59e0b;--danger:#f43f5e;
      --text:#f0f0f8;--sub:#7c7c9a;--muted:#2e2e40;
      --sidebar-w:360px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden}

    #shell{display:flex;height:100vh;width:100vw}
    #sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s}
    #map-area{flex:1;position:relative;min-width:0}
    #map{width:100%;height:100%}
    .leaflet-tile{filter:brightness(.65) saturate(.5)}
    #map-toggle{display:none;position:absolute;bottom:20px;right:16px;z-index:500;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:.8rem;font-weight:700;color:var(--text);cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4)}

    @media(max-width:700px){
      #shell{flex-direction:column}
      #sidebar{width:100%;min-width:0;flex:1;border-right:none;border-bottom:1px solid var(--border)}
      #map-area{height:200px;flex:none;order:-1}
      #map-toggle{display:flex;align-items:center;gap:6px}
      body.map-open #map-area{height:55vh}
      body.map-open #sidebar{flex:none;height:45vh}
    }

    /* Header */
    #hdr{padding:14px 16px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
    .hdr-r{display:flex;align-items:center;justify-content:space-between}
    .logo-r{display:flex;align-items:center;gap:9px}
    .lm{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent-d));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.85rem}
    #hdr h1{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:#fff}
    #ae{font-size:.68rem;color:var(--sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
    #bl{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:.7rem;font-weight:600;padding:6px 11px;cursor:pointer;transition:border-color .2s,color .2s}
    #bl:hover{border-color:var(--danger);color:var(--danger)}

    /* Stats */
    #stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .sp{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 5px;text-align:center}
    .sp .n{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;line-height:1}
    .sp .l{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--sub);margin-top:2px}
    .ng{color:var(--success)}.no{color:var(--accent)}.nb{color:var(--blue)}.nr{color:var(--danger)}

    /* Tabs */
    #tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
    #tabs::-webkit-scrollbar{display:none}
    .tb{flex:1;min-width:58px;background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:.7rem;font-weight:700;padding:9px 3px;cursor:pointer;transition:color .2s,border-color .2s;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
    .tb.active{color:var(--accent);border-bottom-color:var(--accent)}
    .bdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--danger);margin-left:3px;vertical-align:middle;animation:blink 1.4s ease infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    .panel{display:none;flex:1;overflow-y:auto;padding:12px;flex-direction:column;gap:10px}
    .panel.active{display:flex}
    .panel::-webkit-scrollbar{width:3px}
    .panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .stitle{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--sub);margin-bottom:7px}

    /* Form */
    .fstack{display:flex;flex-direction:column;gap:7px}
    .iw{position:relative}
    .iw .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.82rem;pointer-events:none}
    .iw input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;padding:10px 10px 10px 31px;outline:none;transition:border-color .2s;-webkit-appearance:none}
    .iw input:focus{border-color:var(--accent)}
    .iw input::placeholder{color:var(--muted)}
    #btn-dispatch{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#000;border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.87rem;font-weight:700;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .2s}
    #btn-dispatch:disabled{opacity:.45;cursor:not-allowed}
    #form-msg{font-size:.75rem;text-align:center;min-height:15px;color:var(--sub)}

    /* ═══ REQUEST CARD ═══ */
    .req-card{background:var(--bg);border:1px solid var(--border);border-radius:13px;padding:13px 13px 11px;animation:up .25s ease;position:relative}
    @keyframes up{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

    /* Type badge (now / scheduled) */
    .type-badge{
      display:inline-flex;align-items:center;gap:4px;
      font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
      padding:3px 8px;border-radius:20px;margin-bottom:8px;
    }
    .type-now      {background:rgba(16,185,129,.12);color:var(--success)}
    .type-scheduled{background:rgba(99,102,241,.12);color:#a5b4fc}

    .req-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
    .req-cust{font-weight:700;font-size:.87rem}
    .req-time-stamp{font-size:.68rem;color:var(--sub)}

    /* Phone row — clickable */
    .req-phone{display:flex;align-items:center;gap:6px;margin-bottom:8px}
    .req-phone a{
      color:var(--success);font-size:.82rem;font-weight:700;text-decoration:none;
      display:flex;align-items:center;gap:5px;
      background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);
      border-radius:8px;padding:5px 10px;transition:background .2s;
    }
    .req-phone a:hover{background:rgba(16,185,129,.15)}

    /* Scheduled time row */
    .req-sched{
      display:flex;align-items:center;gap:6px;
      background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.18);
      border-radius:8px;padding:7px 10px;margin-bottom:8px;
    }
    .req-sched .ico{font-size:.9rem;flex-shrink:0}
    .req-sched .dt{font-size:.8rem;font-weight:600;color:#c7d2fe}
    .req-sched .sub{font-size:.68rem;color:#818cf8;margin-top:1px}

    .req-route{display:flex;align-items:center;gap:5px;font-size:.83rem;font-weight:500;margin-bottom:10px;color:var(--text);flex-wrap:wrap}
    .arr{color:var(--muted);font-size:.7rem}
    .req-actions{display:flex;gap:7px}
    .rdsp{flex:1;background:var(--accent);color:#000;border:none;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.81rem;font-weight:700;padding:10px;cursor:pointer;transition:opacity .2s}
    .rdsp:hover{opacity:.85}.rdsp:disabled{opacity:.4;cursor:not-allowed}
    .rrej{background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:.81rem;font-weight:600;padding:10px 13px;cursor:pointer;transition:border-color .2s,color .2s}
    .rrej:hover{border-color:var(--danger);color:var(--danger)}

    /* Driver cards */
    .dc{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color .2s}
    .dc:hover{border-color:var(--sub)}
    .dav{width:30px;height:30px;background:var(--muted);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
    .di{flex:1;min-width:0}.dn{font-weight:600;font-size:.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dco{font-size:.68rem;color:var(--sub);margin-top:1px}
    .badge{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:20px;flex-shrink:0}
    .badge.available{background:rgba(16,185,129,.12);color:var(--success)}
    .badge.busy{background:rgba(245,158,11,.12);color:var(--warning)}
    .badge.offline{background:rgba(44,44,64,.5);color:var(--sub)}

    /* Ride cards */
    .rc{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:10px 12px;animation:up .25s ease}
    .rrt{display:flex;align-items:center;gap:5px;font-size:.82rem;font-weight:500;margin-bottom:5px}
    .rbt{display:flex;align-items:center;justify-content:space-between}
    .rdv{font-size:.68rem;color:var(--sub)}
    .rst{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:3px}
    .sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .s-pending   .sd{background:var(--sub)}.s-assigned .sd{background:var(--blue);box-shadow:0 0 5px rgba(99,102,241,.7)}
    .s-ongoing   .sd{background:var(--success);box-shadow:0 0 5px rgba(16,185,129,.7)}.s-rejected .sd{background:var(--danger)}.s-completed .sd{background:var(--sub)}
    .s-pending .rst{color:var(--sub)}.s-assigned .rst{color:#818cf8}.s-ongoing .rst{color:var(--success)}.s-rejected .rst{color:#fb7185}.s-completed .rst{color:var(--sub)}

    /* History */
    .hb{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
    #btn-csv{background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.73rem;font-weight:700;padding:6px 12px;cursor:pointer;transition:opacity .2s}
    #btn-csv:hover{opacity:.85}
    .him{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;animation:up .25s ease}
    .hi-rt{display:flex;align-items:center;gap:5px;font-size:.83rem;font-weight:600;margin-bottom:5px}
    .hi-mt{display:flex;gap:9px;font-size:.68rem;color:var(--sub)}

    /* Map */
    #mapinfo{position:absolute;top:10px;right:10px;background:rgba(26,26,36,.9);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:.72rem;color:var(--sub);z-index:500;pointer-events:none}
    #mapinfo strong{display:block;font-family:'Syne',sans-serif;font-size:.8rem;color:var(--text);margin-bottom:2px}

    .empty{text-align:center;color:var(--sub);font-size:.78rem;padding:16px 0}

    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:11px;padding:11px 18px;font-size:.82rem;font-weight:600;color:var(--text);z-index:9999;white-space:nowrap;transition:transform .35s cubic-bezier(.34,1.4,.64,1)}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div id="shell">

  <div id="sidebar">
    <div id="hdr">
      <div class="hdr-r">
        <div class="logo-r"><div class="lm">🚦</div><div><h1>Dispatch</h1><div id="ae">Loading…</div></div></div>
        <button id="bl">Sign Out</button>
      </div>
    </div>

    <div id="stats">
      <div class="sp"><div class="n ng" id="sa">0</div><div class="l">Avail</div></div>
      <div class="sp"><div class="n no" id="sb2">0</div><div class="l">Busy</div></div>
      <div class="sp"><div class="n nb" id="sr">0</div><div class="l">Rides</div></div>
      <div class="sp"><div class="n nr" id="sq">0</div><div class="l">Reqs</div></div>
    </div>

    <div id="tabs">
      <button class="tb active" data-tab="requests">📥 Requests<span class="bdot" id="rdot" style="display:none"></span></button>
      <button class="tb"        data-tab="dispatch">🚖 Dispatch</button>
      <button class="tb"        data-tab="drivers" >👥 Drivers</button>
      <button class="tb"        data-tab="history" >📋 History</button>
    </div>

    <!-- REQUESTS -->
    <div class="panel active" id="tab-requests">
      <div class="stitle">Customer Requests</div>
      <div id="req-list"><div class="empty">No pending requests.</div></div>
    </div>

    <!-- DISPATCH -->
    <div class="panel" id="tab-dispatch">
      <div>
        <div class="stitle">Manual Ride</div>
        <div class="fstack">
          <div class="iw"><span class="ic">📍</span><input type="text" id="ip" placeholder="Pickup location"/></div>
          <div class="iw"><span class="ic">🏁</span><input type="text" id="id2" placeholder="Drop location"/></div>
          <button id="btn-dispatch"><span>＋</span> Dispatch</button>
          <div id="form-msg"></div>
        </div>
      </div>
      <div>
        <div class="stitle">Live Rides</div>
        <div id="rides-list"><div class="empty">No rides yet.</div></div>
      </div>
    </div>

    <!-- DRIVERS -->
    <div class="panel" id="tab-drivers">
      <div class="stitle">All Drivers</div>
      <div id="drv-list"><div class="empty">No drivers online.</div></div>
    </div>

    <!-- HISTORY -->
    <div class="panel" id="tab-history">
      <div class="hb">
        <div><div class="stitle" style="margin:0">Completed Rides</div><div id="htot" style="font-size:.7rem;color:var(--sub);margin-top:2px">0 rides</div></div>
        <button id="btn-csv">⬇ CSV</button>
      </div>
      <div id="hist-list"><div class="empty">No completed rides yet.</div></div>
    </div>
  </div>

  <div id="map-area">
    <div id="map"></div>
    <div id="mapinfo"><strong>Live Fleet</strong>Real-time positions</div>
    <button id="map-toggle" onclick="document.body.classList.toggle('map-open')">🗺 Map</button>
  </div>
</div>
<div id="toast"></div>

<script type="module">
  import { requireAuth, logoutUser, db } from "./auth.js";
  import {
    collection, doc, addDoc, setDoc, updateDoc, getDocs,
    onSnapshot, query, where, orderBy, serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Auth ──────────────────────────────────────────────
  const { user, email } = await requireAuth("admin");
  document.getElementById("ae").textContent = email || user.email;
  document.getElementById("bl").addEventListener("click", async () => { await logoutUser(); window.location.href="login.html"; });

  // ── Tabs ──────────────────────────────────────────────
  document.querySelectorAll(".tb").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tb").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("tab-"+btn.dataset.tab).classList.add("active");
    });
  });

  // ── Map ───────────────────────────────────────────────
  const map = L.map("map").setView([30.9,75.85],12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(map);
  const mkrs = {};

  function toast(msg,color="var(--accent)"){
    const el=document.getElementById("toast");
    el.textContent=msg;el.style.borderLeftColor=color;
    el.classList.add("show");setTimeout(()=>el.classList.remove("show"),3000);
  }

  // ── Stats ─────────────────────────────────────────────
  let sA=0,sB=0,sR=0,sQ=0;
  const upStats=()=>{ ["sa","sb2","sr","sq"].forEach((id,i)=>document.getElementById(id).textContent=[sA,sB,sR,sQ][i]); };

  // ── Drivers ───────────────────────────────────────────
  onSnapshot(collection(db,"drivers"),snap=>{
    const list=document.getElementById("drv-list");
    list.innerHTML=""; sA=0;sB=0;
    if(snap.empty){list.innerHTML='<div class="empty">No drivers online.</div>';upStats();return;}
    snap.forEach(d=>{
      const id=d.id,data=d.data(),st=data.status||"offline",loc=data.location,nm=data.email||id;
      if(st==="available")sA++;if(st==="busy")sB++;
      if(loc){
        const {lat,lng}=loc,col=st==="available"?"#10b981":st==="busy"?"#f59e0b":"#3a3a50";
        if(mkrs[id]){mkrs[id].setLatLng([lat,lng]);mkrs[id].getPopup().setContent(`<b>${nm}</b><br>${st}`);}
        else mkrs[id]=L.marker([lat,lng],{icon:L.divIcon({className:"",html:`<div style="background:${col};width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(0,0,0,.5)"></div>`,iconSize:[12,12],iconAnchor:[6,6]})}).addTo(map).bindPopup(`<b>${nm}</b><br>${st}`);
        const dot=mkrs[id].getElement()?.querySelector("div");if(dot)dot.style.background=col;
      }
      const c=document.createElement("div");c.className="dc";
      c.innerHTML=`<div class="dav">🧑</div><div class="di"><div class="dn">${nm}</div><div class="dco">${loc?`${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)}`:"No GPS"}</div></div><span class="badge ${st}">${st}</span>`;
      c.addEventListener("click",()=>{if(loc)map.flyTo([loc.lat,loc.lng],16);});
      list.appendChild(c);
    });
    upStats();
  });

  // ── Live rides ─────────────────────────────────────────
  onSnapshot(query(collection(db,"rides"),orderBy("createdAt","desc")),snap=>{
    sR=snap.size;upStats();
    const list=document.getElementById("rides-list");list.innerHTML="";
    if(snap.empty){list.innerHTML='<div class="empty">No rides yet.</div>';return;}
    snap.forEach(d=>{
      const r=d.data(),st=r.status||"pending",drv=r.driverEmail||r.driverId||"Unassigned";
      const c=document.createElement("div");c.className=`rc s-${st}`;
      c.innerHTML=`<div class="rrt"><span>📍 ${r.pickup||"—"}</span><span class="arr">→</span><span>🏁 ${r.drop||"—"}</span></div><div class="rbt"><span class="rdv">${r.driverId?`Driver: ${drv}`:"Unassigned"}</span><span class="rst"><span class="sd"></span>${st}</span></div>`;
      list.appendChild(c);
    });
  });

  // ── History ────────────────────────────────────────────
  let histData=[];
  onSnapshot(query(collection(db,"rides"),where("status","==","completed"),orderBy("completedAt","desc")),snap=>{
    histData=[];
    const list=document.getElementById("hist-list");
    document.getElementById("htot").textContent=`${snap.size} ride${snap.size!==1?"s":""}`;
    list.innerHTML="";
    if(snap.empty){list.innerHTML='<div class="empty">No completed rides yet.</div>';return;}
    snap.forEach(d=>{
      const r=d.data(),date=r.completedAt?.toDate?r.completedAt.toDate().toLocaleString():"—",drv=r.driverEmail||r.driverId||"Unknown";
      histData.push({pickup:r.pickup||"",drop:r.drop||"",driver:drv,completed:date});
      const item=document.createElement("div");item.className="him";
      item.innerHTML=`<div class="hi-rt"><span>📍 ${r.pickup||"—"}</span><span style="color:var(--muted)">→</span><span>🏁 ${r.drop||"—"}</span></div><div class="hi-mt"><span>🧑 ${drv}</span><span>🕐 ${date}</span></div>`;
      list.appendChild(item);
    });
  });

  document.getElementById("btn-csv").addEventListener("click",()=>{
    if(!histData.length){toast("No data to export","var(--warning)");return;}
    const csv=["Pickup,Drop,Driver,Completed",...histData.map(r=>[r.pickup,r.drop,r.driver,r.completed].map(v=>`"${v}"`).join(","))].join("\n");
    Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv"})),download:`rides_${new Date().toISOString().slice(0,10)}.csv`}).click();
    toast("CSV exported ✓","var(--success)");
  });

  // ══════════════════════════════════════════════════════
  // CUSTOMER REQUESTS — core feature
  // Shows phone as call link, scheduled time prominently
  // ══════════════════════════════════════════════════════
  onSnapshot(
    query(collection(db,"ride_requests"),where("status","==","pending"),orderBy("createdAt","asc")),
    snap=>{
      sQ=snap.size;upStats();
      const list=document.getElementById("req-list");
      document.getElementById("rdot").style.display=snap.size>0?"inline-block":"none";
      list.innerHTML="";
      if(snap.empty){list.innerHTML='<div class="empty">No pending requests.</div>';return;}

      // Sort: scheduled rides first (by their scheduledAt), then immediate
      const docs=[...snap.docs].sort((a,b)=>{
        const ra=a.data(),rb=b.data();
        // Both scheduled → sort by scheduledAt asc
        if(ra.isScheduled&&rb.isScheduled){
          return new Date(ra.scheduledAt||0)-new Date(rb.scheduledAt||0);
        }
        // Scheduled first
        if(ra.isScheduled) return -1;
        if(rb.isScheduled) return  1;
        return 0;
      });

      docs.forEach(d=>{
        const r=d.data(),rId=d.id;
        const time=r.createdAt?.toDate?r.createdAt.toDate().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—";
        const isScheduled=r.isScheduled&&r.scheduledAt;
        let schedHtml="";
        if(isScheduled){
          const dt=new Date(r.scheduledAt);
          const rel=formatRelTime(dt);
          schedHtml=`<div class="req-sched"><span class="ico">📅</span><div><div class="dt">${dt.toLocaleString([],{dateStyle:"medium",timeStyle:"short"})}</div><div class="sub">${rel}</div></div></div>`;
        }
        const phoneHtml=r.customerPhone
          ?`<div class="req-phone"><a href="tel:${r.customerPhone}">📞 ${r.customerPhone}</a></div>`
          :"";

        const card=document.createElement("div");card.className="req-card";
        card.innerHTML=`
          <div class="type-badge ${isScheduled?"type-scheduled":"type-now"}">${isScheduled?"📅 Scheduled":"⚡ Now"}</div>
          <div class="req-top">
            <span class="req-cust">👤 ${r.customerName||r.customerEmail||"Customer"}</span>
            <span class="req-time-stamp">${time}</span>
          </div>
          ${phoneHtml}
          ${schedHtml}
          <div class="req-route">
            <span>📍 ${r.pickup||"—"}</span><span class="arr">→</span><span>🏁 ${r.drop||"—"}</span>
          </div>
          <div class="req-actions">
            <button class="rdsp">🚖 Dispatch</button>
            <button class="rrej">✕</button>
          </div>`;

        // Dispatch
        card.querySelector(".rdsp").addEventListener("click",async()=>{
          const btn=card.querySelector(".rdsp");
          btn.disabled=true;btn.textContent="Assigning…";
          try{
            const dSnap=await getDocs(query(collection(db,"drivers"),where("status","==","available")));
            if(dSnap.empty){
              await updateDoc(doc(db,"ride_requests",rId),{status:"dispatched"});
              toast("No drivers available — request queued","var(--warning)");return;
            }
            const dDoc=dSnap.docs[0],dId=dDoc.id,dData=dDoc.data();
            const rideRef=await addDoc(collection(db,"rides"),{
              pickup:r.pickup,drop:r.drop,
              status:"assigned",driverId:dId,
              driverEmail:dData.email||dId,
              requestId:rId,customerId:r.customerId,
              customerName:r.customerName||"",
              customerPhone:r.customerPhone||"",
              isScheduled:r.isScheduled||false,
              scheduledAt:r.scheduledAt||null,
              createdAt:serverTimestamp(),
            });
            await setDoc(doc(db,"drivers",dId),{status:"busy"},{merge:true});
            await updateDoc(doc(db,"ride_requests",rId),{status:"assigned",driverId:dId,driverEmail:dData.email||dId,rideId:rideRef.id});
            toast(`Dispatched → ${dData.email||dId}`,"var(--success)");
          }catch(e){console.error("[Dispatch req]",e);btn.disabled=false;btn.textContent="🚖 Dispatch";}
        });

        // Reject
        card.querySelector(".rrej").addEventListener("click",async()=>{
          await updateDoc(doc(db,"ride_requests",rId),{status:"rejected"});
          toast("Request rejected","var(--sub)");
        });

        list.appendChild(card);
      });
    }
  );

  // Helper: relative time string
  function formatRelTime(dt) {
    const diff=dt-Date.now();
    if(diff<0) return "Overdue";
    const mins=Math.round(diff/60000);
    if(mins<60) return `in ${mins} min`;
    const hrs=Math.floor(mins/60),rem=mins%60;
    return rem>0?`in ${hrs}h ${rem}m`:`in ${hrs}h`;
  }

  // ── Manual dispatch ────────────────────────────────────
  document.getElementById("btn-dispatch").addEventListener("click",async()=>{
    const pickup=document.getElementById("ip").value.trim();
    const drop=document.getElementById("id2").value.trim();
    const msg=document.getElementById("form-msg");
    const btn=document.getElementById("btn-dispatch");
    if(!pickup||!drop){msg.textContent="⚠️ Enter both locations.";msg.style.color="var(--danger)";return;}
    btn.disabled=true;btn.textContent="Dispatching…";msg.textContent="";
    try{
      const snap=await getDocs(query(collection(db,"drivers"),where("status","==","available")));
      const ref=doc(collection(db,"rides"));
      if(snap.empty){
        await setDoc(ref,{pickup,drop,status:"pending",driverId:null,createdAt:serverTimestamp()});
        msg.textContent="⏳ Queued — no drivers.";msg.style.color="var(--sub)";
        toast("No drivers — ride queued","var(--warning)");
      }else{
        const dDoc=snap.docs[0],dId=dDoc.id,dData=dDoc.data();
        await setDoc(ref,{pickup,drop,status:"assigned",driverId:dId,driverEmail:dData.email||dId,createdAt:serverTimestamp()});
        await setDoc(doc(db,"drivers",dId),{status:"busy"},{merge:true});
        msg.textContent=`✅ → ${dData.email||dId}`;msg.style.color="var(--success)";
        toast(`Dispatched → ${dData.email||dId}`,"var(--success)");
        document.getElementById("ip").value=document.getElementById("id2").value="";
      }
    }catch(e){msg.textContent="❌ Error.";msg.style.color="var(--danger)";console.error(e);}
    btn.disabled=false;btn.innerHTML="<span>＋</span> Dispatch";
  });

  ["ip","id2"].forEach(id=>{
    document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("btn-dispatch").click();});
  });
</script>
</body>
</html>
