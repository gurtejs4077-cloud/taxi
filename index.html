<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Dispatch Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════ */
    :root {
      --bg:       #09090f;
      --surface:  #111118;
      --card:     #18181f;
      --border:   #242430;
      --accent:   #f59e0b;
      --accent2:  #6366f1;
      --green:    #10b981;
      --red:      #f43f5e;
      --orange:   #f59e0b;
      --text:     #f1f1f8;
      --sub:      #6b6b85;
      --muted:    #2a2a38;
      --radius:   14px;
    }

    /* ══════════════════════════════════════════
       RESET + BASE
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px; /* base — never smaller on mobile */
      overflow: hidden;
    }

    /* ══════════════════════════════════════════
       LAYOUT — desktop: sidebar + map side by side
                mobile:  full screen tabs + bottom nav
    ══════════════════════════════════════════ */
    #app { display: flex; height: 100vh; width: 100vw; }

    /* ── Sidebar (desktop) ─────────────────── */
    #sidebar {
      width: 380px;
      min-width: 380px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Map panel ─────────────────────────── */
    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }
    .leaflet-tile { filter: brightness(.6) saturate(.5); }
    #map-label {
      position: absolute; top: 14px; right: 14px; z-index: 500;
      background: rgba(17,17,24,.9); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 9px 14px; pointer-events: none;
    }
    #map-label strong { display: block; font-family: 'Syne', sans-serif; font-size: 15px; color: var(--text); }
    #map-label span   { font-size: 12px; color: var(--sub); }

    /* ══════════════════════════════════════════
       MOBILE OVERRIDES  (≤ 768px)
    ══════════════════════════════════════════ */
    @media (max-width: 768px) {
      #app { flex-direction: column; }

      /* Map shrinks to a strip at top */
      #map-wrap { height: 180px; flex: none; order: -1; }

      /* Sidebar fills remaining screen */
      #sidebar {
        width: 100%;
        min-width: 0;
        flex: 1;
        border-right: none;
        border-top: 1px solid var(--border);
        overflow: hidden;
      }

      /* Bigger tap targets on mobile */
      .tab-btn { font-size: 13px; padding: 14px 4px; }
      .req-card, .drv-card, .ride-card, .hist-item { padding: 16px; }
      .dispatch-btn { font-size: 16px; padding: 16px; }
      .field-input  { font-size: 16px; padding: 14px 14px 14px 44px; }
    }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    #hdr {
      flex-shrink: 0;
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .logo-box {
      width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), #d97706);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .logo-text h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; }
    #admin-email  { font-size: 12px; color: var(--sub); margin-top: 1px; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #btn-logout   {
      flex-shrink: 0;
      background: transparent; border: 1px solid var(--border); border-radius: 9px;
      color: var(--sub); font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px; font-weight: 600; padding: 9px 14px; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    #btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* ══════════════════════════════════════════
       STATS BAR
    ══════════════════════════════════════════ */
    #stats {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .stat {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 11px; padding: 10px 6px; text-align: center;
    }
    .stat .n {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 800; line-height: 1;
    }
    .stat .l { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--sub); margin-top: 3px; }
    .n-g { color: var(--green); }
    .n-o { color: var(--orange); }
    .n-b { color: var(--accent2); }
    .n-r { color: var(--red); }

    /* ══════════════════════════════════════════
       TABS
    ══════════════════════════════════════════ */
    #tabs {
      flex-shrink: 0;
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    #tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 1; min-width: 72px;
      background: none; border: none;
      border-bottom: 2.5px solid transparent;
      color: var(--sub);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px; font-weight: 700;
      padding: 12px 4px; cursor: pointer;
      transition: color .2s, border-color .2s;
      text-transform: uppercase; letter-spacing: .05em;
      white-space: nowrap; position: relative;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Notification dot on Requests tab */
    .notif-dot {
      position: absolute; top: 8px; right: 10px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
      animation: blink 1.4s ease infinite;
      display: none;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ══════════════════════════════════════════
       TAB PANELS
    ══════════════════════════════════════════ */
    .panel {
      display: none;
      flex: 1; overflow-y: auto;
      padding: 16px;
      flex-direction: column;
      gap: 14px;
    }
    .panel.active { display: flex; }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Section label */
    .sec { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--sub); margin-bottom: 10px; }

    /* Empty state */
    .empty {
      text-align: center; color: var(--sub);
      font-size: 14px; padding: 24px 0;
    }

    /* ══════════════════════════════════════════
       SHARED CARD STYLE
    ══════════════════════════════════════════ */
    .card-base {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    /* ══════════════════════════════════════════
       REQUEST CARDS
    ══════════════════════════════════════════ */
    .req-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; animation: fadeUp .25s ease; }

    /* Type pill */
    .type-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      padding: 4px 10px; border-radius: 20px; margin-bottom: 10px;
    }
    .type-now       { background: rgba(16,185,129,.12); color: var(--green); }
    .type-scheduled { background: rgba(99,102,241,.14); color: #a5b4fc; }

    /* Customer row */
    .req-cust-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 10px; gap: 8px;
    }
    .req-name { font-size: 16px; font-weight: 700; }
    .req-ts   { font-size: 12px; color: var(--sub); white-space: nowrap; }

    /* Phone link */
    .phone-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--green); font-size: 15px; font-weight: 700;
      text-decoration: none;
      background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25);
      border-radius: 9px; padding: 8px 14px;
      margin-bottom: 10px;
      transition: background .2s;
    }
    .phone-link:active { background: rgba(16,185,129,.2); }

    /* Scheduled time box */
    .sched-box {
      background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.2);
      border-radius: 9px; padding: 10px 12px; margin-bottom: 10px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .sched-box .ico { font-size: 1.1rem; margin-top: 1px; }
    .sched-dt  { font-size: 14px; font-weight: 700; color: #c7d2fe; }
    .sched-rel { font-size: 12px; color: #818cf8; margin-top: 2px; }

    /* Route row */
    .req-route {
      font-size: 14px; font-weight: 500; color: var(--text);
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; margin-bottom: 12px; line-height: 1.5;
    }
    .arr { color: var(--sub); font-size: 13px; }

    /* Action buttons */
    .req-actions { display: flex; gap: 8px; }
    /* Request action buttons — 3-button row */
    .req-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .btn-dispatch {
      flex: 1; min-width: 120px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      color: #000; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px; font-weight: 700; padding: 13px 10px;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-dispatch:hover   { opacity: .88; }
    .btn-dispatch:disabled{ opacity: .4; cursor: not-allowed; }

    /* Admin accept — green, takes ride himself */
    .btn-admin-accept {
      flex: 1; min-width: 110px; border: none; border-radius: 10px;
      background: rgba(16,185,129,.15); border: 1.5px solid rgba(16,185,129,.4);
      color: var(--green); font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px; font-weight: 700; padding: 13px 10px;
      cursor: pointer; transition: background .2s;
    }
    .btn-admin-accept:hover   { background: rgba(16,185,129,.25); }
    .btn-admin-accept:disabled{ opacity: .4; cursor: not-allowed; }

    .btn-reject {
      background: transparent; border: 1px solid var(--border);
      border-radius: 10px; color: var(--sub);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 600; padding: 13px 14px;
      cursor: pointer; transition: border-color .2s, color .2s;
    }
    .btn-reject:hover { border-color: var(--red); color: var(--red); }

    /* ══════════════════════════════════════════
       DISPATCH FORM
    ══════════════════════════════════════════ */
    .field-wrap { position: relative; margin-bottom: 10px; }
    .field-ico {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 1rem; pointer-events: none;
    }
    .field-input {
      width: 100%; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 12px;
      color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; padding: 14px 14px 14px 44px;
      outline: none; transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }
    .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,.15); }
    .field-input::placeholder { color: var(--muted); }

    .dispatch-btn {
      width: 100%; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      color: #000; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 700; padding: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s;
    }
    .dispatch-btn:disabled { opacity: .45; cursor: not-allowed; }
    #form-msg { font-size: 13px; text-align: center; min-height: 18px; color: var(--sub); margin-top: 6px; }

    /* ══════════════════════════════════════════
       DRIVER CARDS
    ══════════════════════════════════════════ */
    .drv-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 15px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color .2s;
    }
    .drv-card:active { border-color: var(--sub); }
    .drv-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--muted); display: flex;
      align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .drv-info { flex: 1; min-width: 0; }
    .drv-name  { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drv-coord { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; padding: 5px 10px; border-radius: 20px; flex-shrink: 0; }
    .badge.available { background: rgba(16,185,129,.14); color: var(--green); }
    .badge.busy      { background: rgba(245,158,11,.14); color: var(--orange); }
    .badge.offline   { background: rgba(50,50,70,.5);    color: var(--sub); }

    /* ══════════════════════════════════════════
       RIDE CARDS (live rides)
    ══════════════════════════════════════════ */
    .ride-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 15px;
      animation: fadeUp .25s ease;
    }
    .ride-route { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .ride-meta  { display: flex; align-items: center; justify-content: space-between; }
    .ride-drv   { font-size: 12px; color: var(--sub); }
    .ride-status { font-size: 12px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
    .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .s-pending   .sdot { background: var(--sub); }
    .s-assigned  .sdot { background: var(--accent2); box-shadow: 0 0 6px rgba(99,102,241,.7); }
    .s-ongoing   .sdot { background: var(--green); box-shadow: 0 0 6px rgba(16,185,129,.7); }
    .s-rejected  .sdot { background: var(--red); }
    .s-completed .sdot { background: var(--sub); }
    .s-pending   .ride-status { color: var(--sub); }
    .s-assigned  .ride-status { color: #818cf8; }
    .s-ongoing   .ride-status { color: var(--green); }
    .s-rejected  .ride-status { color: var(--red); }
    .s-completed .ride-status { color: var(--sub); }

    /* ══════════════════════════════════════════
       HISTORY
    ══════════════════════════════════════════ */
    .hist-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .hist-count   { font-size: 13px; color: var(--sub); margin-top: 3px; }
    #btn-csv {
      background: var(--accent2); color: #fff; border: none;
      border-radius: 9px; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px; font-weight: 700; padding: 9px 15px; cursor: pointer;
      transition: opacity .2s;
    }
    #btn-csv:hover { opacity: .85; }
    .hist-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 15px;
      animation: fadeUp .25s ease;
    }
    .hist-route { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 7px; }
    .hist-meta  { display: flex; gap: 12px; font-size: 12px; color: var(--sub); flex-wrap: wrap; }

    /* ══════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════ */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: var(--card); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-radius: 12px;
      padding: 13px 22px; font-size: 14px; font-weight: 600;
      color: var(--text); z-index: 9999; white-space: nowrap;
      transition: transform .35s cubic-bezier(.34,1.4,.64,1);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════ SIDEBAR ══════════ -->
  <div id="sidebar">

    <!-- Header -->
    <div id="hdr">
      <div class="hdr-left">
        <div class="logo-box">🚦</div>
        <div class="logo-text">
          <h1>Dispatch</h1>
          <div id="admin-email">Loading…</div>
        </div>
      </div>
      <button id="btn-logout">Sign Out</button>
    </div>

    <!-- Stats -->
    <div id="stats">
      <div class="stat"><div class="n n-g" id="s-avail">0</div><div class="l">Avail</div></div>
      <div class="stat"><div class="n n-o" id="s-busy">0</div><div class="l">Busy</div></div>
      <div class="stat"><div class="n n-b" id="s-rides">0</div><div class="l">Rides</div></div>
      <div class="stat"><div class="n n-r" id="s-reqs">0</div><div class="l">Reqs</div></div>
    </div>

    <!-- Tabs -->
    <div id="tabs">
      <button class="tab-btn active" data-tab="requests">
        📥 Requests
        <span class="notif-dot" id="notif-dot"></span>
      </button>
      <button class="tab-btn" data-tab="dispatch">🚖 Dispatch</button>
      <button class="tab-btn" data-tab="drivers">👥 Drivers</button>
      <button class="tab-btn" data-tab="history">📋 History</button>
    </div>

    <!-- ── REQUESTS PANEL ── -->
    <div class="panel active" id="tab-requests">
      <div class="sec">Customer Ride Requests</div>
      <div id="req-list"><div class="empty">No pending requests.</div></div>
    </div>

    <!-- ── DISPATCH PANEL ── -->
    <div class="panel" id="tab-dispatch">
      <div>
        <div class="sec">Manual Ride Dispatch</div>
        <div class="field-wrap">
          <span class="field-ico">📍</span>
          <input class="field-input" type="text" id="inp-pickup" placeholder="Pickup location"/>
        </div>
        <div class="field-wrap">
          <span class="field-ico">🏁</span>
          <input class="field-input" type="text" id="inp-drop" placeholder="Drop location"/>
        </div>
        <button class="dispatch-btn" id="btn-create-ride">
          <span>＋</span> Dispatch Ride
        </button>
        <div id="form-msg"></div>
      </div>
      <div>
        <div class="sec">Live Rides</div>
        <div id="rides-list"><div class="empty">No rides yet.</div></div>
      </div>
    </div>

    <!-- ── DRIVERS PANEL ── -->
    <div class="panel" id="tab-drivers">
      <div class="sec">All Drivers</div>
      <div id="driver-list"><div class="empty">No drivers online.</div></div>
    </div>

    <!-- ── HISTORY PANEL ── -->
    <div class="panel" id="tab-history">
      <div class="hist-toolbar">
        <div>
          <div class="sec" style="margin:0">Completed Rides</div>
          <div class="hist-count" id="hist-count">0 rides</div>
        </div>
        <button id="btn-csv">⬇ Export CSV</button>
      </div>
      <div id="hist-list"><div class="empty">No completed rides yet.</div></div>
    </div>

  </div><!-- /sidebar -->

  <!-- ══════════ MAP ══════════ -->
  <div id="map-wrap">
    <div id="map"></div>
    <div id="map-label">
      <strong>Live Fleet</strong>
      <span>Real-time driver positions</span>
    </div>
  </div>

</div><!-- /app -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════
     FIREBASE + APP LOGIC
══════════════════════════════════════════════ -->
<script type="module">
import { requireAuth, logoutUser, db } from "./auth.js";
import {
  collection, doc,
  addDoc, setDoc, updateDoc, getDocs,
  onSnapshot, query, where, orderBy, serverTimestamp,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── AUTH ──────────────────────────────────────────────
const { user, email } = await requireAuth("admin");
document.getElementById("admin-email").textContent = email || user.email;

document.getElementById("btn-logout").addEventListener("click", async () => {
  await logoutUser();
  window.location.href = "login.html";
});

// ── TABS ──────────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
  });
});

// ── MAP ───────────────────────────────────────────────
const map = L.map("map").setView([30.9, 75.85], 12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors"
}).addTo(map);
const driverMarkers = {};

// ── TOAST ─────────────────────────────────────────────
function toast(msg, color = "var(--accent)") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.borderLeftColor = color;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3200);
}

// ── STATS ─────────────────────────────────────────────
let sA = 0, sB = 0, sR = 0, sQ = 0;
function updateStats() {
  document.getElementById("s-avail").textContent = sA;
  document.getElementById("s-busy").textContent  = sB;
  document.getElementById("s-rides").textContent = sR;
  document.getElementById("s-reqs").textContent  = sQ;
}

// ── DRIVERS LISTENER ─────────────────────────────────
onSnapshot(collection(db, "drivers"), snap => {
  const list = document.getElementById("driver-list");
  list.innerHTML = "";
  sA = 0; sB = 0;

  if (snap.empty) {
    list.innerHTML = '<div class="empty">No drivers online.</div>';
    updateStats(); return;
  }

  snap.forEach(d => {
    const id     = d.id;
    const data   = d.data();
    const status = data.status || "offline";
    const loc    = data.location;
    const name   = data.email || id;

    if (status === "available") sA++;
    if (status === "busy")      sB++;

    // Update map marker
    if (loc) {
      const { lat, lng } = loc;
      const col = status === "available" ? "#10b981" : status === "busy" ? "#f59e0b" : "#3a3a50";
      const html = `<div style="background:${col};width:13px;height:13px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 8px rgba(0,0,0,.5)"></div>`;

      if (driverMarkers[id]) {
        driverMarkers[id].setLatLng([lat, lng]);
        driverMarkers[id].getPopup().setContent(`<b>${name}</b><br>${status}`);
        const dot = driverMarkers[id].getElement()?.querySelector("div");
        if (dot) dot.style.background = col;
      } else {
        driverMarkers[id] = L.marker([lat, lng], {
          icon: L.divIcon({ className: "", html, iconSize: [13, 13], iconAnchor: [6.5, 6.5] })
        }).addTo(map).bindPopup(`<b>${name}</b><br>${status}`);
      }
    }

    // Sidebar card
    const card = document.createElement("div");
    card.className = "drv-card";
    card.innerHTML = `
      <div class="drv-avatar">🧑</div>
      <div class="drv-info">
        <div class="drv-name">${name}</div>
        <div class="drv-coord">${loc ? `${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)}` : "No GPS yet"}</div>
      </div>
      <span class="badge ${status}">${status}</span>`;
    card.addEventListener("click", () => { if (loc) map.flyTo([loc.lat, loc.lng], 16); });
    list.appendChild(card);
  });

  updateStats();
});

// ── LIVE RIDES LISTENER ───────────────────────────────
onSnapshot(
  query(collection(db, "rides"), orderBy("createdAt", "desc")),
  snap => {
    sR = snap.size;
    updateStats();
    const list = document.getElementById("rides-list");
    list.innerHTML = "";
    if (snap.empty) { list.innerHTML = '<div class="empty">No rides yet.</div>'; return; }

    snap.forEach(d => {
      const r  = d.data();
      const st = r.status || "pending";
      const drv = r.driverEmail || r.driverId || "Unassigned";
      const card = document.createElement("div");
      card.className = `ride-card s-${st}`;
      card.innerHTML = `
        <div class="ride-route">
          <span>📍 ${r.pickup || "—"}</span>
          <span class="arr">→</span>
          <span>🏁 ${r.drop || "—"}</span>
        </div>
        <div class="ride-meta">
          <span class="ride-drv">${r.driverId ? `Driver: ${drv}` : "Unassigned"}</span>
          <span class="ride-status"><span class="sdot"></span>${st}</span>
        </div>`;
      list.appendChild(card);
    });
  }
);

// ── HISTORY LISTENER ──────────────────────────────────
let histData = [];
onSnapshot(
  query(collection(db, "rides"), where("status", "==", "completed"), orderBy("completedAt", "desc")),
  snap => {
    histData = [];
    const list = document.getElementById("hist-list");
    document.getElementById("hist-count").textContent = `${snap.size} ride${snap.size !== 1 ? "s" : ""}`;
    list.innerHTML = "";
    if (snap.empty) { list.innerHTML = '<div class="empty">No completed rides yet.</div>'; return; }

    snap.forEach(d => {
      const r    = d.data();
      const date = r.completedAt?.toDate ? r.completedAt.toDate().toLocaleString() : "—";
      const drv  = r.driverEmail || r.driverId || "Unknown";
      histData.push({ pickup: r.pickup || "", drop: r.drop || "", driver: drv, completed: date });

      const item = document.createElement("div");
      item.className = "hist-item";
      item.innerHTML = `
        <div class="hist-route">
          <span>📍 ${r.pickup || "—"}</span>
          <span style="color:var(--sub)">→</span>
          <span>🏁 ${r.drop || "—"}</span>
        </div>
        <div class="hist-meta">
          <span>🧑 ${drv}</span>
          <span>🕐 ${date}</span>
        </div>`;
      list.appendChild(item);
    });
  }
);

// CSV export
document.getElementById("btn-csv").addEventListener("click", () => {
  if (!histData.length) { toast("No data to export", "var(--orange)"); return; }
  const rows = histData.map(r => [r.pickup, r.drop, r.driver, r.completed].map(v => `"${v}"`).join(","));
  const csv  = ["Pickup,Drop,Driver,Completed At", ...rows].join("\n");
  Object.assign(document.createElement("a"), {
    href:     URL.createObjectURL(new Blob([csv], { type: "text/csv" })),
    download: `rides_${new Date().toISOString().slice(0, 10)}.csv`,
  }).click();
  toast("CSV exported ✓", "var(--green)");
});

// ══════════════════════════════════════════════════════
// CUSTOMER REQUESTS LISTENER
// Reads from ride_requests collection (pending only)
// Shows phone as call link, scheduled time, dispatch button
// ══════════════════════════════════════════════════════
console.log("[Admin] Starting ride_requests listener…");

onSnapshot(
  query(
    collection(db, "ride_requests"),
    where("status", "==", "pending"),
    orderBy("createdAt", "asc")
  ),
  snap => {
    console.log("[Admin] ride_requests snap — size:", snap.size);

    sQ = snap.size;
    updateStats();

    const dot = document.getElementById("notif-dot");
    dot.style.display = snap.size > 0 ? "block" : "none";

    const list = document.getElementById("req-list");
    list.innerHTML = "";

    if (snap.empty) {
      list.innerHTML = '<div class="empty">No pending requests.</div>';
      return;
    }

    // Sort: scheduled rides first (by scheduledAt), then immediate (by createdAt)
    const docs = [...snap.docs].sort((a, b) => {
      const ra = a.data(), rb = b.data();
      if (ra.isScheduled && rb.isScheduled) {
        return new Date(ra.scheduledAt || 0) - new Date(rb.scheduledAt || 0);
      }
      if (ra.isScheduled) return -1;
      if (rb.isScheduled) return 1;
      return 0;
    });

    docs.forEach(d => {
      const r   = d.data();
      const rId = d.id;

      console.log("[Admin] Request:", rId, r);

      // Time stamp
      const timeStr = r.createdAt?.toDate
        ? r.createdAt.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        : "—";

      // Type pill
      const isScheduled = !!(r.isScheduled && r.scheduledAt);
      const typePill = isScheduled
        ? `<div class="type-pill type-scheduled">📅 Scheduled</div>`
        : `<div class="type-pill type-now">⚡ Ride Now</div>`;

      // Phone
      const phoneLine = r.customerPhone
        ? `<a class="phone-link" href="tel:${r.customerPhone}">📞 ${r.customerPhone}</a>`
        : "";

      // Scheduled time
      let schedLine = "";
      if (isScheduled) {
        const dt  = new Date(r.scheduledAt);
        const rel = relTime(dt);
        schedLine = `
          <div class="sched-box">
            <div class="ico">📅</div>
            <div>
              <div class="sched-dt">${dt.toLocaleString([], { dateStyle: "medium", timeStyle: "short" })}</div>
              <div class="sched-rel">${rel}</div>
            </div>
          </div>`;
      }

      const card = document.createElement("div");
      card.className = "req-card";
      card.innerHTML = `
        ${typePill}
        <div class="req-cust-row">
          <span class="req-name">👤 ${r.customerName || r.customerEmail || "Customer"}</span>
          <span class="req-ts">${timeStr}</span>
        </div>
        ${phoneLine}
        ${schedLine}
        <div class="req-route">
          <span>📍 ${r.pickup || "—"}</span>
          <span class="arr">→</span>
          <span>🏁 ${r.drop || "—"}</span>
        </div>
        <div class="req-actions">
          <button class="btn-dispatch">📢 Dispatch to All Drivers</button>
          <button class="btn-admin-accept">🙋 Accept Myself</button>
          <button class="btn-reject">✕ Reject</button>
        </div>`;

      // ── BROADCAST to ALL drivers ─────────────────────────────────────────
      // Creates ride with status:"broadcast" and driverId:null
      // EVERY online driver sees the popup with customer phone number.
      // First driver to tap Accept claims the ride (race-condition safe via Firestore tx).
      card.querySelector(".btn-dispatch").addEventListener("click", async () => {
        const btn = card.querySelector(".btn-dispatch");
        btn.disabled = true;
        btn.textContent = "Broadcasting…";
        try {
          const rideRef = await addDoc(collection(db, "rides"), {
            pickup:        r.pickup,
            drop:          r.drop,
            status:        "broadcast",   // all drivers see this
            driverId:      null,          // nobody assigned yet
            driverEmail:   null,
            requestId:     rId,
            customerId:    r.customerId   || null,
            customerName:  r.customerName  || "",
            customerPhone: r.customerPhone || "",
            isScheduled:   r.isScheduled   || false,
            scheduledAt:   r.scheduledAt   || null,
            createdAt:     serverTimestamp(),
          });
          // Customer sees "finding driver"
          await updateDoc(doc(db, "ride_requests", rId), {
            status: "dispatched",
            rideId: rideRef.id,
          });
          toast("📢 Broadcast to all available drivers!", "var(--green)");
        } catch (err) {
          console.error("[Broadcast]", err);
          btn.disabled    = false;
          btn.textContent = "📢 Dispatch to All Drivers";
          toast("❌ Error. Check console.", "var(--red)");
        }
      });

      // ── ADMIN ACCEPT HIMSELF ──────────────────────────────────────────────
      // Admin takes the ride personally — no driver needed.
      card.querySelector(".btn-admin-accept").addEventListener("click", async () => {
        const btn = card.querySelector(".btn-admin-accept");
        btn.disabled = true;
        btn.textContent = "Accepting…";
        try {
          const rideRef = await addDoc(collection(db, "rides"), {
            pickup:        r.pickup,
            drop:          r.drop,
            status:        "ongoing",
            driverId:      "admin",
            driverEmail:   email || "admin",
            requestId:     rId,
            customerId:    r.customerId   || null,
            customerName:  r.customerName  || "",
            customerPhone: r.customerPhone || "",
            isScheduled:   r.isScheduled   || false,
            scheduledAt:   r.scheduledAt   || null,
            createdAt:     serverTimestamp(),
          });
          await updateDoc(doc(db, "ride_requests", rId), {
            status:      "ongoing",
            driverId:    "admin",
            driverEmail: email || "admin",
            rideId:      rideRef.id,
          });
          toast("✅ You accepted this ride!", "var(--green)");
        } catch (err) {
          console.error("[Admin accept]", err);
          btn.disabled    = false;
          btn.textContent = "🙋 Accept Myself";
          toast("❌ Error. Check console.", "var(--red)");
        }
      });

      // ── Reject ───────────────────────────────────────────────────────────
      card.querySelector(".btn-reject").addEventListener("click", async () => {
        await updateDoc(doc(db, "ride_requests", rId), { status: "rejected" });
        toast("Request rejected", "var(--sub)");
      });

      list.appendChild(card);
    });
  },
  err => {
    console.error("[ride_requests listener error]", err.code, err.message);
    // Common cause: missing Firestore composite index
    // Firebase will print a link in console to create it
    document.getElementById("req-list").innerHTML =
      `<div class="empty">⚠️ Index error — check browser console for a link to create the required Firestore index.</div>`;
  }
);

// ── MANUAL DISPATCH ───────────────────────────────────
document.getElementById("btn-create-ride").addEventListener("click", async () => {
  const pickup = document.getElementById("inp-pickup").value.trim();
  const drop   = document.getElementById("inp-drop").value.trim();
  const msg    = document.getElementById("form-msg");
  const btn    = document.getElementById("btn-create-ride");

  if (!pickup || !drop) {
    msg.textContent = "⚠️ Enter both pickup and drop.";
    msg.style.color = "var(--orange)";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Dispatching…";
  msg.textContent = "";

  try {
    const snap = await getDocs(query(collection(db, "drivers"), where("status", "==", "available")));
    const ref  = doc(collection(db, "rides"));

    if (snap.empty) {
      await setDoc(ref, { pickup, drop, status: "pending", driverId: null, createdAt: serverTimestamp() });
      msg.textContent = "⏳ Queued — no drivers available.";
      msg.style.color = "var(--sub)";
      toast("No drivers — ride queued", "var(--orange)");
    } else {
      const dDoc = snap.docs[0], dId = dDoc.id, dData = dDoc.data();
      await setDoc(ref, {
        pickup, drop, status: "assigned",
        driverId: dId, driverEmail: dData.email || dId,
        createdAt: serverTimestamp(),
      });
      await setDoc(doc(db, "drivers", dId), { status: "busy" }, { merge: true });
      const label = dData.email || dId;
      msg.textContent = `✅ Assigned to ${label}`;
      msg.style.color = "var(--green)";
      toast(`Dispatched → ${label}`, "var(--green)");
      document.getElementById("inp-pickup").value = "";
      document.getElementById("inp-drop").value   = "";
    }
  } catch (e) {
    msg.textContent = "❌ Error. Check console.";
    msg.style.color = "var(--red)";
    console.error(e);
  }

  btn.disabled = false;
  btn.innerHTML = "<span>＋</span> Dispatch Ride";
});

["inp-pickup", "inp-drop"].forEach(id => {
  document.getElementById(id).addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("btn-create-ride").click();
  });
});

// ── HELPER: relative time string ──────────────────────
function relTime(dt) {
  const diff = dt - Date.now();
  if (diff < 0) return "Overdue";
  const m = Math.round(diff / 60000);
  if (m < 60) return `in ${m} min`;
  const h = Math.floor(m / 60), rem = m % 60;
  return rem > 0 ? `in ${h}h ${rem}m` : `in ${h}h`;
}
