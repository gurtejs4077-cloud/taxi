<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>RideApp — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  
  <style>

    /* ================================
   🔥 MOBILE UX UPGRADE PACK
   ================================ */
@media (max-width: 768px){

  :root{
    font-size: 18px; /* base scale up */
  }

  /* ===== TEXT IMPROVEMENT ===== */
  body{
    line-height: 1.5;
  }

  .clabel, .flabel, .rlbl, .l, .sec{
    font-size: 13px !important;
    font-weight: 800 !important;
    letter-spacing: .05em;
    color: #a5b4fc !important;
  }

  .app-n, .app-t, .logo-t h1{
    font-size: 20px !important;
  }

  /* ===== INPUTS ===== */
  input, .inp, .linp, .finp{
    height: 56px !important;
    font-size: 17px !important;
    border-radius: 16px !important;
    padding: 16px 16px 16px 48px !important;
  }

  /* ===== BUTTONS (VERY IMPORTANT) ===== */
  button, .act-btn, .btn-bc, .btn-self, .btn-rej,
  #btn-book, #btn-go, #btn-complete, .dis-btn{
    height: 56px !important;
    font-size: 17px !important;
    border-radius: 16px !important;
  }

  /* make primary buttons more obvious */
  #btn-book, #btn-go, .btn-bc{
    font-size: 18px !important;
    font-weight: 800 !important;
  }

  /* ===== CARD SPACING ===== */
  .card, .req-card, .drv-card{
    padding: 20px !important;
    border-radius: 18px !important;
  }

  #main, .panel{
    padding: 18px !important;
    gap: 16px !important;
  }

  /* ===== TAP FRIENDLY LISTS ===== */
  .h-item, .req-card, .drv-card{
    margin-bottom: 12px !important;
  }

  /* ===== ROUTE TEXT CLEAN ===== */
  .req-route, .rval{
    font-size: 15px !important;
    line-height: 1.6;
  }

  /* ===== FIX SMALL CLICK AREAS ===== */
  .phone-btn, .active-phone, .popup-phone{
    padding: 16px !important;
    font-size: 17px !important;
  }

  /* ===== TOP BAR SPACING ===== */
  #topbar, #hdr{
    padding: 14px 16px !important;
  }

  /* ===== STATUS / BADGES ===== */
  .badge, .sbdg{
    font-size: 12px !important;
    padding: 6px 12px !important;
  }

  /* ===== POPUP (DRIVER) ===== */
  #ride-popup-box{
    padding: 22px !important;
    border-radius: 24px 24px 0 0 !important;
  }

  /* ===== SCROLL COMFORT ===== */
  *{
    -webkit-overflow-scrolling: touch;
  }
}


  </style>
  
  
  
  
  
  
  <style>
    :root{
      --bg:#09090f;--card:#18181f;--border:#242430;
      --accent:#f59e0b;--acc-d:#d97706;
      --green:#10b981;--red:#f43f5e;
      --text:#f1f1f8;--sub:#6b6b85;--muted:#2a2a38;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;-webkit-tap-highlight-color:transparent}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Plus Jakarta Sans',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px 16px 40px;
      background-image:radial-gradient(ellipse 70% 30% at 50% 0%,rgba(245,158,11,.09) 0%,transparent 65%);
    }

    .wrap{width:100%;max-width:400px;animation:up .5s cubic-bezier(.34,1.4,.64,1)}
    @keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    /* Brand */
    .brand{text-align:center;margin-bottom:28px}
    .brand-icon{
      width:62px;height:62px;margin:0 auto 14px;
      background:linear-gradient(135deg,var(--accent),var(--acc-d));
      border-radius:18px;display:flex;align-items:center;justify-content:center;
      font-size:1.7rem;box-shadow:0 12px 32px rgba(245,158,11,.32);
    }
    .brand h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-1px;color:#fff}
    .brand p{color:var(--sub);font-size:.9rem;margin-top:5px}

    /* Card */
    .card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:26px 22px;box-shadow:0 24px 64px rgba(0,0,0,.5)}

    /* Mode tabs */
    .tabs{display:flex;background:#09090f;border:1px solid var(--border);border-radius:12px;padding:4px;gap:4px;margin-bottom:22px}
    .tab{flex:1;padding:11px;border:none;border-radius:9px;background:transparent;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
    .tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.4)}

    /* Fields */
    .field{margin-bottom:14px}
    .field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sub);margin-bottom:7px}
    .fw{position:relative}
    .fi{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;line-height:1}
    input{
      width:100%;background:#09090f;border:1.5px solid var(--border);
      border-radius:12px;color:var(--text);
      font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;
      padding:14px 14px 14px 44px;outline:none;-webkit-appearance:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
    input::placeholder{color:var(--muted)}
    .pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--sub);cursor:pointer;font-size:1.1rem;padding:4px}

    /* Register-only fields */
    .reg-only{display:none}

    /* Submit */
    #btn-go{
      width:100%;border:none;border-radius:13px;
      background:linear-gradient(135deg,var(--accent),var(--acc-d));
      color:#000;font-family:'Plus Jakarta Sans',sans-serif;
      font-size:16px;font-weight:700;padding:15px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:9px;
      box-shadow:0 8px 24px rgba(245,158,11,.3);
      transition:opacity .2s,transform .1s;margin-top:4px;
    }
    #btn-go:hover{opacity:.9}#btn-go:active{transform:scale(.98)}
    #btn-go:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

    .spin{width:18px;height:18px;border:2.5px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Messages */
    .msg{margin-top:14px;border-radius:11px;padding:11px 14px;font-size:14px;display:none}
    .msg.err{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#fda4af}
    .msg.ok {background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}

    .divider{height:1px;background:var(--border);margin:20px 0}
    .hint{text-align:center;font-size:13px;color:var(--sub);line-height:1.7}
    .hint strong{color:var(--text)}


  


  </style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="brand-icon">🚕</div>
    <h1>RideApp</h1>
    <p>Book rides, drive, or manage the fleet</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login"    type="button">Sign In</button>
      <button class="tab"        id="tab-register" type="button">Register</button>
    </div>

    <!-- Name (register only) -->
    <div class="field reg-only" id="f-name">
      <label>Full Name</label>
      <div class="fw"><span class="fi">🧑</span><input type="text"  id="inp-name"  placeholder="Your full name" autocomplete="name"/></div>
    </div>

    <!-- Phone (register only) -->
    <div class="field reg-only" id="f-phone">
      <label>Phone Number</label>
      <div class="fw"><span class="fi">📱</span><input type="tel"   id="inp-phone" placeholder="+91 98765 43210" inputmode="tel" autocomplete="tel"/></div>
    </div>

    <!-- Email -->
    <div class="field">
      <label>Email</label>
      <div class="fw"><span class="fi">✉️</span><input type="email" id="inp-email" placeholder="you@example.com" autocomplete="email"/></div>
    </div>

    <!-- Password -->
    <div class="field">
      <label>Password</label>
      <div class="fw">
        <span class="fi">🔒</span>
        <input type="password" id="inp-pw" placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-eye" id="pw-eye" type="button">👁</button>
      </div>
    </div>

    <button id="btn-go">
      <div class="spin" id="spin"></div>
      <span id="btn-label">Sign In</span>
    </button>

    <div class="msg err" id="msg-err"></div>
    <div class="msg ok"  id="msg-ok"></div>

    <div class="divider"></div>
    <div class="hint">
      All new accounts start as <strong>Customer</strong>.<br/>
      Admin or Superadmin can upgrade your role.
    </div>
  </div>
</div>

<script type="module">
  import { loginUser, registerUser, auth, db, redirectByRole } from "./auth.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, getDoc }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let mode = "login";

  // Auto-redirect if already signed in
  onAuthStateChanged(auth, async user => {
    if (!user) return;
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) redirectByRole(snap.data().role);
    } catch(e){}
  });

  // Tab switching
  document.getElementById("tab-login").addEventListener("click",    () => setMode("login"));
  document.getElementById("tab-register").addEventListener("click", () => setMode("register"));

  function setMode(m) {
    mode = m;
    document.getElementById("tab-login").classList.toggle("active",    m==="login");
    document.getElementById("tab-register").classList.toggle("active", m==="register");
    document.querySelectorAll(".reg-only").forEach(el => el.style.display = m==="register" ? "block" : "none");
    document.getElementById("btn-label").textContent = m==="login" ? "Sign In" : "Create Account";
    clear();
  }

  // Submit
  document.getElementById("btn-go").addEventListener("click", go);
  ["inp-name","inp-phone","inp-email","inp-pw"].forEach(id =>
    document.getElementById(id)?.addEventListener("keydown", e => { if(e.key==="Enter") go(); })
  );

  async function go() {
    const email = document.getElementById("inp-email").value.trim();
    const pw    = document.getElementById("inp-pw").value;
    const name  = document.getElementById("inp-name").value.trim();
    const phone = document.getElementById("inp-phone").value.trim();
    clear();

    if (!email || !pw)          { showErr("Enter email and password."); return; }
    if (mode==="register" && !name)  { showErr("Enter your full name."); return; }
    if (mode==="register" && !phone) { showErr("Enter your phone number."); return; }
    if (mode==="register" && pw.length < 6) { showErr("Password needs at least 6 characters."); return; }

    loading(true);
    try {
      if (mode==="login") {
        const { role } = await loginUser(email, pw);
        redirectByRole(role);
      } else {
        await registerUser(email, pw, name, phone);
        showOk("Account created! Redirecting…");
        setTimeout(() => redirectByRole("customer"), 1200);
      }
    } catch(err) {
      showErr(friendly(err.code || err.message));
      loading(false);
    }
  }

  function loading(on) {
    document.getElementById("btn-go").disabled   = on;
    document.getElementById("spin").style.display = on ? "block" : "none";
    document.getElementById("btn-label").textContent = on
      ? (mode==="login" ? "Signing in…" : "Creating…")
      : (mode==="login" ? "Sign In"     : "Create Account");
  }
  function showErr(m){ const el=document.getElementById("msg-err"); el.textContent="⚠️ "+m; el.style.display="block"; }
  function showOk(m) { const el=document.getElementById("msg-ok");  el.textContent="✅ "+m; el.style.display="block"; }
  function clear()   { document.getElementById("msg-err").style.display=document.getElementById("msg-ok").style.display="none"; }

  function friendly(c) {
    return ({
      "auth/user-not-found":       "No account found. Try registering.",
      "auth/wrong-password":       "Wrong password.",
      "auth/invalid-credential":   "Invalid email or password.",
      "auth/invalid-email":        "Invalid email address.",
      "auth/email-already-in-use": "Email already registered. Sign in instead.",
      "auth/weak-password":        "Password too short (min 6 chars).",
      "auth/too-many-requests":    "Too many attempts — wait a moment.",
    })[c] || "Something went wrong. Try again.";
  }

  document.getElementById("pw-eye").addEventListener("click", () => {
    const i = document.getElementById("inp-pw");
    i.type = i.type==="password" ? "text" : "password";
  });
</script>
</body>
</html>
