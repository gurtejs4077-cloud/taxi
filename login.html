<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>RideApp — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #13131a;
      --card:     #1a1a24;
      --border:   #252535;
      --accent:   #f59e0b;
      --accent-d: #d97706;
      --success:  #10b981;
      --danger:   #f43f5e;
      --text:     #f0f0f8;
      --sub:      #7c7c9a;
      --muted:    #3a3a50;
      --r:        16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:var(--bg); color:var(--text);
      font-family:'Plus Jakarta Sans',sans-serif;
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:20px 16px 40px;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% -10%, rgba(245,158,11,.12) 0%, transparent 70%),
        radial-gradient(circle at 1px 1px, #1e1e2e 1px, transparent 0);
      background-size: 100% 100%, 28px 28px;
    }

    .wrap{width:100%;max-width:390px;animation:up .5s cubic-bezier(.34,1.4,.64,1)}
    @keyframes up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

    /* Brand */
    .brand{text-align:center;margin-bottom:32px}
    .brand-mark{
      width:64px;height:64px;margin:0 auto 16px;
      background:linear-gradient(135deg,var(--accent),var(--accent-d));
      border-radius:20px;display:flex;align-items:center;justify-content:center;
      font-size:1.8rem;box-shadow:0 12px 32px rgba(245,158,11,.35);
    }
    .brand h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-1px;color:#fff}
    .brand p{color:var(--sub);font-size:.9rem;margin-top:5px}

    /* Card */
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px 22px;box-shadow:0 24px 64px rgba(0,0,0,.5)}

    /* Mode tabs */
    .tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;gap:4px;margin-bottom:24px}
    .tab{flex:1;padding:10px;border:none;border-radius:9px;background:transparent;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
    .tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.4)}

    /* Fields */
    .field{margin-bottom:16px}
    .field label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--sub);margin-bottom:7px}
    .inp-wrap{position:relative}
    .inp-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;line-height:1}
    input{
      width:100%;background:var(--surface);border:1.5px solid var(--border);
      border-radius:12px;color:var(--text);
      font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;
      padding:14px 14px 14px 42px;outline:none;
      transition:border-color .2s,box-shadow .2s;
      -webkit-appearance:none;
    }
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
    input::placeholder{color:var(--muted)}
    .pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--sub);cursor:pointer;font-size:1.1rem;padding:4px;line-height:1}

    /* Hidden field */
    .hidden{display:none}

    /* Submit */
    #btn-submit{
      width:100%;border:none;border-radius:14px;
      background:linear-gradient(135deg,var(--accent),var(--accent-d));
      color:#000;font-family:'Plus Jakarta Sans',sans-serif;
      font-size:1rem;font-weight:700;padding:15px;
      cursor:pointer;margin-top:6px;
      display:flex;align-items:center;justify-content:center;gap:10px;
      box-shadow:0 8px 24px rgba(245,158,11,.35);
      transition:opacity .2s,transform .1s,box-shadow .2s;
    }
    #btn-submit:hover{opacity:.92;box-shadow:0 10px 28px rgba(245,158,11,.45)}
    #btn-submit:active{transform:scale(.98)}
    #btn-submit:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

    .spinner{width:18px;height:18px;border:2.5px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Messages */
    .msg{margin-top:14px;border-radius:10px;padding:11px 14px;font-size:.84rem;display:none}
    .msg.err{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#fda4af}
    .msg.ok {background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}

    /* Divider + hint */
    .divider{height:1px;background:var(--border);margin:22px 0}
    .hint{text-align:center;font-size:.78rem;color:var(--sub);line-height:1.7}
    .hint strong{color:var(--text)}
    code{background:var(--muted);border-radius:5px;padding:2px 6px;font-size:.72rem}
  </style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="brand-mark">🚕</div>
    <h1>RideApp</h1>
    <p>Book a ride, drive, or manage fleet</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login"    type="button">Sign In</button>
      <button class="tab"        id="tab-register" type="button">Register</button>
    </div>

    <!-- Name (register only) -->
    <div class="field hidden" id="field-name">
      <label>Your Name</label>
      <div class="inp-wrap">
        <span class="inp-icon">🧑</span>
        <input type="text" id="inp-name" placeholder="Full name" autocomplete="name"/>
      </div>
    </div>

    <!-- Email -->
    <div class="field">
      <label>Email</label>
      <div class="inp-wrap">
        <span class="inp-icon">✉️</span>
        <input type="email" id="inp-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label>Password</label>
      <div class="inp-wrap">
        <span class="inp-icon">🔒</span>
        <input type="password" id="inp-pw" placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-eye" id="pw-toggle" type="button">👁</button>
      </div>
    </div>

    <button id="btn-submit">
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Sign In</span>
    </button>

    <div class="msg err" id="msg-err"></div>
    <div class="msg ok"  id="msg-ok"></div>

    <div class="divider"></div>
    <div class="hint">
      New accounts default to <strong>Customer</strong> role.<br/>
      Drivers & Admins are set in Firestore <code>users</code> collection.
    </div>
  </div>
</div>

<script type="module">
  import { loginUser, registerUser, auth, db, redirectByRole } from "./auth.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, getDoc }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let mode = "login";

  const tabLogin    = document.getElementById("tab-login");
  const tabRegister = document.getElementById("tab-register");
  const fieldName   = document.getElementById("field-name");
  const btnSubmit   = document.getElementById("btn-submit");
  const btnLabel    = document.getElementById("btn-label");
  const spinner     = document.getElementById("spinner");
  const msgErr      = document.getElementById("msg-err");
  const msgOk       = document.getElementById("msg-ok");

  // Auto-redirect if already signed in
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) redirectByRole(snap.data().role);
    } catch(e) {}
  });

  // Tab switching
  tabLogin.addEventListener("click",    () => switchMode("login"));
  tabRegister.addEventListener("click", () => switchMode("register"));

  function switchMode(m) {
    mode = m;
    tabLogin.classList.toggle("active",    m === "login");
    tabRegister.classList.toggle("active", m === "register");
    fieldName.classList.toggle("hidden",   m === "login");
    btnLabel.textContent = m === "login" ? "Sign In" : "Create Account";
    clear();
  }

  // Submit
  btnSubmit.addEventListener("click", go);
  ["inp-name","inp-email","inp-pw"].forEach(id =>
    document.getElementById(id)?.addEventListener("keydown", e => { if (e.key==="Enter") go(); })
  );

  async function go() {
    const email = document.getElementById("inp-email").value.trim();
    const pw    = document.getElementById("inp-pw").value;
    const name  = document.getElementById("inp-name").value.trim();
    clear();
    if (!email || !pw)        { showErr("Enter your email and password."); return; }
    if (mode==="register" && pw.length < 6) { showErr("Password needs at least 6 characters."); return; }
    loading(true);
    try {
      if (mode === "login") {
        const { role } = await loginUser(email, pw);
        redirectByRole(role);
      } else {
        const { role } = await registerUser(email, pw, "customer", name);
        showOk("Account created! Redirecting…");
        setTimeout(() => redirectByRole(role), 1200);
      }
    } catch(err) {
      showErr(friendly(err.code || err.message));
      loading(false);
    }
  }

  function loading(on) {
    btnSubmit.disabled    = on;
    spinner.style.display = on ? "block" : "none";
    btnLabel.textContent  = on ? (mode==="login" ? "Signing in…" : "Creating…") : (mode==="login" ? "Sign In" : "Create Account");
  }
  function showErr(m) { msgErr.textContent="⚠️ "+m; msgErr.style.display="block"; }
  function showOk(m)  { msgOk.textContent ="✅ "+m; msgOk.style.display ="block"; }
  function clear()    { msgErr.style.display=msgOk.style.display="none"; }

  function friendly(c) {
    return ({
      "auth/user-not-found":       "No account found. Try registering.",
      "auth/wrong-password":       "Wrong password.",
      "auth/invalid-credential":   "Invalid email or password.",
      "auth/invalid-email":        "Invalid email address.",
      "auth/email-already-in-use": "Email already registered. Sign in instead.",
      "auth/weak-password":        "Password too short (min 6 chars).",
      "auth/too-many-requests":    "Too many attempts — wait a moment.",
    })[c] || "Something went wrong. Try again.";
  }

  document.getElementById("pw-toggle").addEventListener("click", () => {
    const i = document.getElementById("inp-pw");
    i.type = i.type === "password" ? "text" : "password";
  });
</script>
</body>
</html>
