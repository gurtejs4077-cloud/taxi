<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dispatch — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #080c14;
      --surface: #0f1623;
      --border:  #1c2535;
      --accent:  #f97316;
      --success: #22c55e;
      --danger:  #ef4444;
      --muted:   #4b5a72;
      --text:    #e2ecf8;
      --subtext: #8496b0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(circle at 1px 1px, #1c2535 1px, transparent 0);
      background-size: 32px 32px;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: var(--accent);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(249,115,22,0.35);
    }
    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: #fff;
    }
    .brand p { color: var(--subtext); font-size: 0.88rem; margin-top: 4px; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    /* Tabs (Login / Register) */
    .auth-tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 4px;
      margin-bottom: 22px;
      gap: 4px;
    }
    .auth-tab {
      flex: 1; padding: 9px;
      border: none; border-radius: 8px;
      background: transparent;
      color: var(--subtext);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .auth-tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--subtext); margin-bottom: 7px;
    }

    .input-wrap { position: relative; }
    .input-wrap .icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); font-size: 0.95rem; pointer-events: none;
    }
    input {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 11px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      padding: 12px 12px 12px 38px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }
    input::placeholder { color: var(--muted); }

    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1rem; padding: 2px;
    }
    .pw-toggle:hover { color: var(--text); }

    /* Register extra field (name) */
    #register-name-field { display: none; }

    /* Primary action button */
    .btn-primary {
      width: 100%; border: none; border-radius: 11px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      padding: 13px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover   { opacity: 0.9; }
    .btn-primary:active  { transform: scale(0.98); }
    .btn-primary:disabled{ opacity: 0.45; cursor: not-allowed; }

    #btn-submit { background: var(--accent); color: #fff; margin-top: 4px; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error / success messages */
    .msg-box {
      margin-top: 14px; border-radius: 10px;
      padding: 10px 14px; font-size: 0.83rem; display: none;
    }
    .msg-box.error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5;
    }
    .msg-box.success {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac;
    }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .hint {
      text-align: center; font-size: 0.76rem;
      color: var(--muted); line-height: 1.7;
    }
    .hint strong { color: var(--subtext); }
    code {
      background: var(--border); border-radius: 4px;
      padding: 1px 5px; font-size: 0.72rem;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="brand">
    <div class="brand-icon">🚦</div>
    <h1>Dispatch</h1>
    <p>Taxi Management System</p>
  </div>

  <div class="card">

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"    type="button">Sign In</button>
      <button class="auth-tab"        id="tab-register" type="button">Register</button>
    </div>

    <!-- Name field (register only) -->
    <div class="field" id="register-name-field">
      <label>Full Name</label>
      <div class="input-wrap">
        <span class="icon">🧑</span>
        <input type="text" id="input-name" placeholder="Your name"/>
      </div>
    </div>

    <!-- Email -->
    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <span class="icon">✉️</span>
        <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-toggle" id="pw-toggle" type="button">👁</button>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-primary" id="btn-submit">
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Sign In</span>
    </button>

    <!-- Messages -->
    <div class="msg-box error"   id="error-msg"></div>
    <div class="msg-box success" id="success-msg"></div>

    <div class="divider"></div>

    <div class="hint">
      Admins → redirected to <strong>Dashboard</strong><br/>
      Drivers → redirected to <strong>Driver Panel</strong><br/>
      New registrations default to <code>driver</code> role.<br/>
      To create an admin, set <code>role: "admin"</code> in Firestore.
    </div>

  </div>
</div>

<script type="module">
  import { loginUser, registerUser, auth, db } from "./auth.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, getDoc }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── State ────────────────────────────────────────────────
  let mode = "login"; // "login" | "register"

  const tabLogin    = document.getElementById("tab-login");
  const tabRegister = document.getElementById("tab-register");
  const nameField   = document.getElementById("register-name-field");
  const btnSubmit   = document.getElementById("btn-submit");
  const btnLabel    = document.getElementById("btn-label");
  const spinner     = document.getElementById("spinner");
  const errorEl     = document.getElementById("error-msg");
  const successEl   = document.getElementById("success-msg");

  // ── Tab switching ────────────────────────────────────────
  tabLogin.addEventListener("click", () => switchMode("login"));
  tabRegister.addEventListener("click", () => switchMode("register"));

  function switchMode(m) {
    mode = m;
    tabLogin.classList.toggle("active",    m === "login");
    tabRegister.classList.toggle("active", m === "register");
    nameField.style.display = m === "register" ? "block" : "none";
    btnLabel.textContent    = m === "login" ? "Sign In" : "Create Account";
    hideMessages();
  }

  // ── Auto-redirect if already logged in ───────────────────
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) redirect(snap.data().role);
    } catch (e) { /* not logged in properly, stay on page */ }
  });

  // ── Submit handler (login or register) ───────────────────
  btnSubmit.addEventListener("click", handleSubmit);

  ["input-email", "input-password", "input-name"].forEach(id => {
    document.getElementById(id)?.addEventListener("keydown", e => {
      if (e.key === "Enter") handleSubmit();
    });
  });

  async function handleSubmit() {
    const email    = document.getElementById("input-email").value.trim();
    const password = document.getElementById("input-password").value;
    const name     = document.getElementById("input-name").value.trim();

    hideMessages();

    // Validation
    if (!email || !password) {
      showError("Please enter your email and password.");
      return;
    }
    if (mode === "register" && password.length < 6) {
      showError("Password must be at least 6 characters.");
      return;
    }

    setLoading(true);

    try {
      if (mode === "login") {
        const { role } = await loginUser(email, password);
        redirect(role);
      } else {
        // Register as driver by default
        await registerUser(email, password, "driver");
        showSuccess("Account created! Redirecting to driver panel…");
        setTimeout(() => redirect("driver"), 1200);
      }
    } catch (err) {
      console.error("[Auth]", err);
      showError(friendlyError(err.code || err.message));
      setLoading(false);
    }
  }

  // ── Helpers ──────────────────────────────────────────────
  function redirect(role) {
    window.location.href = role === "admin" ? "index.html" : "driver.html";
  }

  function setLoading(on) {
    btnSubmit.disabled      = on;
    spinner.style.display   = on ? "block" : "none";
    if (on) btnLabel.textContent = mode === "login" ? "Signing in…" : "Creating account…";
    else    btnLabel.textContent = mode === "login" ? "Sign In"     : "Create Account";
  }

  function showError(msg) {
    errorEl.textContent   = "⚠️ " + msg;
    errorEl.style.display = "block";
    successEl.style.display = "none";
  }

  function showSuccess(msg) {
    successEl.textContent   = "✅ " + msg;
    successEl.style.display = "block";
    errorEl.style.display   = "none";
  }

  function hideMessages() {
    errorEl.style.display   = "none";
    successEl.style.display = "none";
  }

  function friendlyError(code) {
    const map = {
      "auth/user-not-found":        "No account found. Switch to Register to create one.",
      "auth/wrong-password":        "Incorrect password. Try again.",
      "auth/invalid-credential":    "Invalid email or password.",
      "auth/invalid-email":         "Please enter a valid email address.",
      "auth/email-already-in-use":  "This email is already registered. Sign in instead.",
      "auth/weak-password":         "Password must be at least 6 characters.",
      "auth/too-many-requests":     "Too many attempts. Please wait a moment.",
      "auth/network-request-failed":"Network error. Check your connection.",
    };
    return map[code] || code || "Something went wrong. Please try again.";
  }

  // Password show/hide
  document.getElementById("pw-toggle").addEventListener("click", () => {
    const inp = document.getElementById("input-password");
    inp.type  = inp.type === "password" ? "text" : "password";
  });
</script>
</body>
</html>
