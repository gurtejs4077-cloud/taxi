<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow | My Galactic Performance</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="js/firebase-config.js"></script>
    <style>
        :root {
            --acc-cyan: #00f2ff;
            --acc-pink: #ff00ff;
            --glass-bg: rgba(10, 10, 15, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #000;
            overflow: hidden;
        }

        .phone {
            border: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(135deg, #050507 0%, #0a0a12 50%, #050507 100%);
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .phone::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(255, 0, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .screen {
            padding: 0;
            background: transparent;
            position: relative;
            z-index: 2;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            margin: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .s-header {
            padding: 24px 24px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .s-greet { font-size: 12px; color: var(--t-tertiary); text-transform: uppercase; letter-spacing: 2px; }
        .s-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: #fff; }

        .s-av {
            width: 48px; height: 48px; border-radius: 16px;
            background: linear-gradient(135deg, var(--acc-cyan), var(--acc-pink));
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin: 0 16px; padding: 24px; border-radius: 32px;
            position: relative; overflow: hidden;
        }

        .hero-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-stat-v { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--acc-cyan); }
        .hero-stat-l { font-size: 10px; font-weight: 700; color: var(--t-tertiary); letter-spacing: 1px; }

        .class-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: 0.3s;
        }

        .class-card:hover { background: rgba(255,255,255,0.05); transform: translateX(5px); border-color: var(--acc-cyan); }

        .time-badge {
            background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 14px;
            text-align: center; min-width: 60px;
        }

        .cl-time { font-size: 16px; font-weight: 800; color: #fff; }
        .cl-ampm { font-size: 10px; font-weight: 700; color: var(--t-tertiary); }

        .cl-name { font-size: 16px; font-weight: 700; color: #fff; }
        .cl-trainer { font-size: 12px; color: var(--acc-cyan); opacity: 0.8; }

        .btn-book {
            background: transparent; border: 1px solid var(--acc-cyan);
            color: var(--acc-cyan); padding: 8px 16px; border-radius: 12px;
            font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        .btn-book:hover { background: var(--acc-cyan); color: #000; box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 16px; }
        .stat-box {
            background: var(--glass-bg); padding: 20px; border-radius: 24px;
            border: 1px solid var(--glass-border);
        }

        .prog-circle {
            width: 80px; height: 80px; position: relative;
            margin: 0 auto 12px;
        }

        .prog-svg { transform: rotate(-90deg); }
        .prog-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 4; }
        .prog-fill { fill: none; stroke: var(--acc-cyan); stroke-width: 4; stroke-linecap: round; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        .prog-val {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 18px; font-weight: 800; color: #fff;
        }

        .bottom-nav {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            height: 80px;
            border-radius: 32px 32px 0 0;
            padding: 0 32px;
        }

        .bn-item { transition: 0.3s; color: var(--t-tertiary); }
        .bn-item.on { color: var(--acc-cyan); }
        .bn-item.on .bn-icon { background: var(--acc-cyan); box-shadow: 0 0 15px var(--acc-cyan); }

        /* Animations */
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone">
            
            <div class="phone-notch">
                <span class="notch-time" id="clock">9:41</span>
                <div class="notch-icons">
                    <div style="background: var(--acc-cyan); width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 10px var(--acc-cyan);"></div>
                </div>
            </div>

            <div class="screen">
                <div class="s-header animate" style="animation-delay: 0.1s">
                    <div>
                        <div class="s-greet">NEURAL_LINK ACTIVE</div>
                        <div class="s-name" id="userName">User...</div>
                    </div>
                    <div class="s-av" id="userInitials">--</div>
                </div>

                <div class="hero-card animate" style="animation-delay: 0.2s">
                    <div class="hero-plan" id="gymPlan" style="font-size: 10px; color: var(--acc-pink); font-weight: 800; letter-spacing: 2px;">SYNCING...</div>
                    <div class="hero-title" style="font-size: 13px; color: #fff; margin: 4px 0 16px;">Biometric Standing</div>
                    <div class="hero-row" style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div class="hero-stat-v" id="attendanceCount">0</div>
                            <div class="hero-stat-l">MISSIONS</div>
                        </div>
                        <div class="prog-circle">
                            <svg class="prog-svg" width="80" height="80">
                                <circle class="prog-bg" cx="40" cy="40" r="34"></circle>
                                <circle id="circleProgress" class="prog-fill" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="213.6"></circle>
                            </svg>
                            <div class="prog-val" id="goalProgress">0%</div>
                        </div>
                    </div>
                </div>

                <div class="sec-title animate" style="padding: 24px 20px 12px; color: var(--t-tertiary); font-size: 11px; font-weight: 800; letter-spacing: 2px; animation-delay: 0.3s">AVAILABLE SECTOR OPS</div>
                
                <div id="classList" class="animate" style="padding: 0 16px; animation-delay: 0.4s">
                    <div style="color: var(--t-tertiary); font-size: 13px; text-align: center; padding: 20px;">Fetching global sync...</div>
                </div>

                <div class="stats-grid animate" style="margin-top: 24px; animation-delay: 0.5s">
                    <div class="stat-box">
                        <div style="color: var(--acc-cyan); font-size: 20px; font-weight: 800;">742</div>
                        <div style="font-size: 10px; color: var(--t-tertiary); font-weight: 700;">VALOR_KPIS</div>
                    </div>
                    <div class="stat-box">
                        <div style="color: var(--acc-pink); font-size: 20px; font-weight: 800;">Top 2%</div>
                        <div style="font-size: 10px; color: var(--t-tertiary); font-weight: 700;">FLEET_RANK</div>
                    </div>
                </div>
                
                <div style="height: 100px;"></div>
            </div>

            <!-- Bottom Nav -->
            <div class="bottom-nav">
                <div class="bn-item on">
                    <div class="bn-icon" style="width: 24px; height: 4px; border-radius: 2px; margin: 0 auto 4px;"></div>
                    <div class="bn-lbl" style="font-size: 10px; font-weight: 800; text-transform: uppercase;">Nexus</div>
                </div>
                <div class="bn-item">
                    <div class="bn-icon" style="width: 24px; height: 4px; border-radius: 2px; margin: 0 auto 4px; background: rgba(255,255,255,0.05);"></div>
                    <div class="bn-lbl" style="font-size: 10px; font-weight: 800; text-transform: uppercase;">Ops</div>
                </div>
                <div class="bn-item" onclick="logout()">
                    <div class="bn-icon" style="width: 24px; height: 4px; border-radius: 2px; margin: 0 auto 4px; background: rgba(255,255,255,0.05);"></div>
                    <div class="bn-lbl" style="font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--acc-pink);">Eject</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Update clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
        }, 1000);

        const userId = localStorage.getItem('user_id');
        const gymId = localStorage.getItem('gym_id');

        if (!userId) window.location.href = 'index.html';

        // Fetch User Data
        db.collection('members').doc(userId).onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('userName').textContent = data.name;
                document.getElementById('userInitials').textContent = data.name.substring(0,2).toUpperCase();
                document.getElementById('gymPlan').textContent = `${data.plan.toUpperCase()} PROTOCOL ACTIVE`;
                document.getElementById('attendanceCount').textContent = data.attendance || 0;
                
                const progress = data.goal_progress || 0;
                document.getElementById('goalProgress').textContent = progress + "%";
                
                // Update Circle
                const circle = document.getElementById('circleProgress');
                const radius = 34;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (progress / 100) * circumference;
                circle.style.strokeDashoffset = offset;
            }
        });

        // Fetch Classes (Real-time)
        db.collection('classes').where('gym_id', '==', gymId)
            .onSnapshot(snap => {
                const list = document.getElementById('classList');
                list.innerHTML = "";
                if (snap.empty) {
                    list.innerHTML = '<div style="color: var(--t-tertiary); font-size: 13px; text-align: center; padding: 40px;">No sector ops available today.</div>';
                    return;
                }
                snap.forEach(doc => {
                    const c = doc.data();
                    const card = document.createElement('div');
                    card.className = 'class-card';
                    card.innerHTML = `
                        <div class="time-badge">
                            <div class="cl-time">${c.time.split(' ')[0]}</div>
                            <div class="cl-ampm">${c.time.split(' ')[1]}</div>
                        </div>
                        <div style="flex: 1;">
                            <div class="cl-name">${c.name}</div>
                            <div class="cl-trainer">${c.trainer_name}</div>
                        </div>
                        <button class="btn-book">LINK</button>
                    `;
                    list.appendChild(card);
                });
            });

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
